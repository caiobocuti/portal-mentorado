<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Painel do Mentor · Publi Advisor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0B0B0C; --surface:#161617; --surface-alt:#1E1E20;
  --border:#2B2B2E; --border-strong:#3C3C40;
  --text:#F4F4F5; --text-muted:#A1A1AA; --text-faint:#71717A;
  --accent:#FF1E3D; --accent-soft:#2B0D12; --ink:#FF1E3D;
  --green:#4ADE80; --green-soft:#12251A;
  --amber:#FBBF24; --amber-soft:#2A220A;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:"Cairo",-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",Helvetica,Arial,sans-serif;
  background:radial-gradient(1200px 600px at 80% -10%, #19090c 0%, transparent 60%), var(--bg);
  color:var(--text); min-height:100vh; line-height:1.5; letter-spacing:.01em;
}
input{color:var(--text);font-family:inherit}
input::placeholder{color:var(--text-faint);opacity:1}
.hidden{display:none!important}
.wrap{max-width:1200px;margin:0 auto;padding:24px 20px 60px}

/* ===== LOGIN ===== */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{
  background:var(--surface);border:1px solid var(--border);border-radius:16px;
  padding:36px 32px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.5)
}
.brand{font-size:12px;text-transform:uppercase;letter-spacing:.16em;color:var(--accent);font-weight:700;margin-bottom:8px}
.login-card h1{font-size:24px;font-weight:900;margin-bottom:4px}
.login-card .sub{color:var(--text-muted);font-size:13.5px;margin-bottom:24px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-faint);font-weight:600;margin-bottom:6px}
.field input{
  width:100%;padding:12px 14px;background:var(--surface-alt);
  border:1px solid var(--border-strong);border-radius:8px;font-size:15px
}
.field input:focus{outline:2px solid var(--ink);outline-offset:-1px;border-color:var(--ink)}
.btn-main{
  width:100%;padding:13px;margin-top:6px;background:var(--ink);color:#fff;border:none;
  border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit
}
.btn-main:hover{filter:brightness(1.08)}
.btn-main:disabled{opacity:.5;cursor:default}
.login-err{background:var(--accent-soft);border:1px solid var(--accent);color:var(--accent);
  padding:10px 12px;border-radius:8px;font-size:13px;margin-bottom:14px}
.login-card .hint{margin-top:16px;font-size:12px;color:var(--text-muted);text-align:center;line-height:1.6}

/* ===== HEADER ===== */
.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;
  flex-wrap:wrap;margin-bottom:22px;padding-bottom:18px;border-bottom:1px solid var(--border)}
.topbar h1{font-size:22px;font-weight:900}
.topbar .brand{margin-bottom:2px}
.topbar-actions{display:flex;gap:8px;align-items:center}
.btn-ghost{background:transparent;border:1px solid var(--border-strong);color:var(--text-muted);
  padding:8px 14px;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:600}
.btn-ghost:hover{border-color:var(--accent);color:var(--text)}

/* ===== SUMMARY STRIP ===== */
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.sum-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px}
.sum-card .k{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-faint);font-weight:600;margin-bottom:6px}
.sum-card .v{font-size:26px;font-weight:900;line-height:1}
.sum-card .v small{font-size:14px;font-weight:600;color:var(--text-muted)}
.sum-card .v.accent{color:var(--accent)}
.sum-card .v.green{color:var(--green)}

/* ===== MENTEE GRID ===== */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:16px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;
  cursor:pointer;transition:border-color .15s,transform .15s}
.card:hover{border-color:var(--accent);transform:translateY(-2px)}
.card.empty{cursor:default;opacity:.62}
.card.empty:hover{border-color:var(--border);transform:none}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:14px}
.card-top .nome{font-size:17px;font-weight:800}
.card-top .meta{font-size:12px;color:var(--text-muted);margin-top:2px}
.pill{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;
  padding:4px 9px;border-radius:20px;white-space:nowrap}
.pill.ok{background:var(--green-soft);color:var(--green)}
.pill.old{background:var(--amber-soft);color:var(--amber)}
.pill.none{background:var(--surface-alt);color:var(--text-faint);border:1px solid var(--border)}
.kpis{display:grid;grid-template-columns:1fr 1fr;gap:10px 14px}
.kpi .lbl{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-faint);font-weight:600}
.kpi .val{font-size:18px;font-weight:800;margin-top:2px}
.kpi .val.sm{font-size:14px;font-weight:700}
.kpi .val.green{color:var(--green)}
.kpi .val.accent{color:var(--accent)}
.kpi .val.amber{color:var(--amber)}
.card-foot{margin-top:14px;padding-top:12px;border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;gap:8px}
.taskbar{flex:1;height:7px;background:var(--surface-alt);border-radius:6px;overflow:hidden}
.taskbar > span{display:block;height:100%;background:var(--green)}
.card-foot .tasklbl{font-size:11.5px;color:var(--text-muted);white-space:nowrap}
.alert-flag{margin-top:12px;font-size:12px;color:var(--amber);background:var(--amber-soft);
  border-left:3px solid var(--amber);padding:8px 10px;border-radius:0 6px 6px 0}
.empty-msg{font-size:13px;color:var(--text-faint);padding:18px 0 4px}

/* ===== MODAL ===== */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(3px);
  z-index:50;display:flex;align-items:flex-start;justify-content:center;padding:32px 16px;overflow-y:auto}
.modal{background:var(--surface);border:1px solid var(--border-strong);border-radius:16px;
  width:100%;max-width:760px;padding:28px;box-shadow:0 30px 80px rgba(0,0,0,.6)}
.modal-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:6px}
.modal-hdr h2{font-size:23px;font-weight:900}
.modal-hdr .sub{font-size:13px;color:var(--text-muted);margin-top:2px}
.x{background:transparent;border:1px solid var(--border-strong);color:var(--text-muted);
  width:34px;height:34px;border-radius:8px;font-size:18px;cursor:pointer;line-height:1;flex-shrink:0}
.x:hover{border-color:var(--accent);color:var(--text)}
.sect{margin-top:22px}
.sect h3{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);
  font-weight:700;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.mgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.mbox{background:var(--surface-alt);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.mbox .l{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-faint);font-weight:600}
.mbox .n{font-size:18px;font-weight:800;margin-top:3px}
.mbox .n.green{color:var(--green)} .mbox .n.accent{color:var(--accent)} .mbox .n.amber{color:var(--amber)}
.chart-wrap{background:var(--surface-alt);border:1px solid var(--border);border-radius:10px;padding:14px;height:240px}
table.hist{width:100%;border-collapse:collapse;font-size:13px}
table.hist th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;
  color:var(--text-faint);font-weight:600;padding:7px 8px;border-bottom:1px solid var(--border)}
table.hist td{padding:8px;border-bottom:1px solid var(--border)}
.tlist{display:flex;flex-direction:column;gap:8px}
.titem{background:var(--surface-alt);border:1px solid var(--border);border-radius:8px;padding:10px 12px;
  display:flex;align-items:flex-start;gap:10px}
.tstatus{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;
  padding:3px 8px;border-radius:5px;white-space:nowrap;margin-top:1px}
.ts-feito{background:var(--green-soft);color:var(--green)}
.ts-em_andamento{background:#0d1f2b;color:#5cc8ff}
.ts-atrasado{background:var(--accent-soft);color:var(--accent)}
.ts-nao_comecou{background:var(--surface);color:var(--text-faint);border:1px solid var(--border)}
.ts-cancelado{background:var(--surface);color:var(--text-faint);text-decoration:line-through}
.titem .tdesc{font-size:13px;flex:1}
.titem .tprio{font-size:10px;font-weight:700;color:var(--accent)}
.muda{font-size:13px;line-height:1.6}
.muda b{color:var(--text)}
.muda .row{margin-bottom:8px;padding:10px 12px;background:var(--surface-alt);border-radius:8px;border:1px solid var(--border)}
.muda .lbl{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--accent);font-weight:700;display:block;margin-bottom:3px}
.dim{color:var(--text-faint)}
.loading{text-align:center;padding:60px 0;color:var(--text-muted);font-size:14px}
.ts-concluida{background:var(--green-soft);color:var(--green)}
.ts-pendente{background:var(--surface);color:var(--text-faint);border:1px solid var(--border)}
.ts-atrasada{background:var(--accent-soft);color:var(--accent)}
.ts-cancelada{background:var(--surface);color:var(--text-faint);text-decoration:line-through}
.eform{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.eform .ef{display:flex;flex-direction:column;gap:4px}
.ef label{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-faint);font-weight:600}
.eform input,.ef input,.etask select{width:100%;padding:9px 10px;background:var(--surface-alt);border:1px solid var(--border-strong);border-radius:8px;font-size:14px;color:var(--text);font-family:inherit}
.etask{display:flex;align-items:center;gap:10px;background:var(--surface-alt);border:1px solid var(--border);border-radius:8px;padding:8px 10px;margin-bottom:8px}
.etask .ed{flex:1;font-size:13px}
.etask select{width:auto;min-width:130px}
.ebar{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;position:sticky;bottom:-1px;background:var(--surface);padding:12px 0}
@media(max-width:600px){.eform{grid-template-columns:1fr 1fr}}
@media(max-width:760px){.summary{grid-template-columns:1fr 1fr}.mgrid{grid-template-columns:1fr 1fr}}
@media(max-width:520px){.summary{grid-template-columns:1fr 1fr}.mgrid{grid-template-columns:1fr}}
</style>
</head>

e aprovação: Daiana revisa a V1, o time aprova a V2, o Robert só vê o master final. Recupera ~15h/semana do Robert para projetos premium e criação de cases.","impacto":"1 projeto premium a mais/mês = +R$40-60k/mês de capacidade"}],"plano":[{"prioridade":"maxima","descricao":"Documentar SOP de aprovação criativa em 3 níveis (Daiana revisão primária, Robert só vê o final)","status":"pendente","prazo":"30 dias"},{"prioridade":"maxima","descricao":"Contratar BDR (vaga aberta · R$1.800 fixo + comissão)","status":"em_andamento","prazo":"jan/26"},{"prioridade":"alta","descricao":"Rate card formal 3 níveis: Padrão R$15-25k · Premium R$40-60k · Expo R$80k+","status":"pendente","prazo":"45 dias"},{"prioridade":"alta","descricao":"Empacotar 'Pacote Expo' como produto único e replicável","status":"pendente","prazo":"30 dias"},{"prioridade":"alta","descricao":"Capacitar a Daiana como dona dos projetos pós-venda","status":"em_andamento","prazo":""},{"prioridade":"alta","descricao":"Criar automação Apollo de e-mails em massa","status":"pendente","prazo":"30 dias"},{"prioridade":"alta","descricao":"Mapear marcas da Expo Inter — meta R$80k no evento","status":"em_andamento","prazo":""},{"prioridade":"media","descricao":"Avaliar migração do Run Run It para ClickUp","status":"pendente","prazo":""},{"prioridade":"media","descricao":"Manter cadência da newsletter mensal","status":"concluida","prazo":""}],"direcao":"O próximo estágio é Crescimento real. Três movimentos: (1) BDR rodando com meta de 30 leads/semana; (2) padrão de aprovação criativa que libere o Robert do gargalo, com a Daiana dona da revisão; (3) plano de carreira formal para o time, para reter quem já é peça-chave. A grande virada de chave: a Adverse tem qualidade autoral premium mas ainda se vende como produtora regional — o salto de ticket está em reposicionar a marca, não em prospectar mais.","trilha":["delegar","posicionamento","prospeccao","recorrencia"],"diag":{"handle":"@adverse.rec","redes":["Seu Instagram está saudável e ativo: 65 posts, 1.658 seguidores e destaques de bastidor (“on set”, “Frames”) que mostram o cuidado com o ofício. O tom é autoral e a bio comunica propósito e localização (Passo Fundo).","O ponto cego é o foco: a bio fala para “marcas” em geral — não diz para quem. O agro, que é o coração do negócio de vocês e o setor onde a Adverse já é reconhecida no RS, está invisível na vitrine."],"cruzamento":["Hoje o Instagram vende “produtora autoral de Passo Fundo” — exatamente o rótulo que a estratégia quer superar. A venda de vocês já é agro (Apollo, LinkedIn, networking do setor), mas a vitrine não conta essa história.","Assumir o nicho agro publicamente é o caminho mais curto para justificar o salto de ticket de R$ 35k para R$ 50k. O reconhecimento que vocês já têm offline precisa aparecer online."],"ganhos":["Reescrever a bio para cravar o nicho: de “histórias que conectam marcas e pessoas” para algo como “Filmes para marcas do agro que querem presença premium”.","Transformar o case Sicredi no seu primeiro “case hero”: um “como fizemos” fixado no topo, virando prova de autoridade no agro.","Criar um destaque “Agro” com os melhores trabalhos do setor — hoje os destaques são de ofício, não de nicho.","Levar a autoridade de um dos sócios para o LinkedIn com narrativa agro; a bio do Instagram pode apontar para lá.","Padronizar 1 case hero por trimestre como formato de conteúdo, conectando as redes ao reposicionamento."],"reflexao":["Vocês querem ser a “boutique autoral do agro”, mas o Instagram ainda não diz “agro”. O que impede de assumir o nicho publicamente?","Quem de vocês vai ser o rosto da autoridade no LinkedIn?","O case Sicredi pode virar o primeiro “case hero” — nas redes e na proposta ao mesmo tempo?"]}},"ARCO-M3LJ":{"nome":"Arco Filmes","empresa":"João Lucas & Jonatan · Chapecó/SC · Multinicho regional","momento":"crescimento","metaFaturamentoMensal":83000,"resumo":"A Arco é a operação mais estruturada do grupo: fluxo por tipo de projeto, custo-hora calculado (R$32 custo / R$50 venda), 13 clientes recorrentes (R$33,5k/mês), 3 planos definidos (Onstage/Pro/VIP) e BDR começando. Vocês superaram a meta de 2025 (R$482k vs R$340k previsto). A base está pronta — agora é hora de subir o ticket e cuidar dos sócios.","maturidade":{"comercial":6,"operacao":7,"financeiro":6,"posicionamento":5,"lideranca":6,"gestao":6,"escalabilidade":5},"comercial":{"pipelineValor":380000,"prospeccaoAtiva":true,"canalPrincipal":"Indicação + Networking regional + BDR (novo)"},"oportunidades":["Meta de R$1M em 2026 é realista — pipeline + BDR + recorrência alinham com a curva","Destravar tickets acima de R$50k já se aproximando do nicho imobiliário de luxo","Brasão (orçamento R$120k em andamento) — primeiro projeto premium real","Replicar o modelo de planos Onstage/Pro/VIP em outra cidade (Curitiba via Jonatan)"],"alavancas":[{"titulo":"Reciclar a carteira: 6 planos antigos → 4 planos Pro/VIP","mecanismo":"Hoje 8 clientes pagam R$1,5k (R$12k/mês). Migrar metade para Onstage R$2,5k e reocupar a capacidade com 4 clientes Pro de R$4,5k (R$18k/mês). Net: +R$8k de recorrência sem ampliar o time.","impacto":"+R$8k MRR = +R$96k/ano sem aumentar headcount"},{"titulo":"Quebrar a barreira de cobrar R$50k+ em projeto pontual","mecanismo":"O Brasão (R$120k) vira o primeiro case institucional real. Usar como referência para fechar mais 2 nesse ticket até dez/26, vendendo método e direção criativa — não diárias.","impacto":"+R$240k/ano em projetos pontuais premium (2 jobs × R$120k)"},{"titulo":"Pró-labore de R$10k libera decisão estratégica dos sócios","mecanismo":"Pró-labore de R$3,5k mata o foco estratégico — toda decisão vira sobrevivência. Subir para R$10k destrava a saúde mental e libera os sócios para vender mais em vez de operar mais.","impacto":"Indireto e real: 1 deal Pro/VIP novo/mês porque os sócios pensam estrategicamente"}],"plano":[{"prioridade":"maxima","descricao":"Comunicar a migração dos planos antigos (R$1k/1,5k/2k → Onstage/Pro/VIP) com 3 meses de antecedência","status":"pendente","prazo":"30 dias"},{"prioridade":"maxima","descricao":"Subir pró-labore para R$10k cada no Q2/26","status":"pendente","prazo":"60 dias"},{"prioridade":"maxima","descricao":"Fechar o Brasão (R$120k) e usar como case institucional","status":"em_andamento","prazo":""},{"prioridade":"maxima","descricao":"Onboarding e metas da Jennifer (BDR): 30 contatos + 6 reuniões + 2 propostas/semana","status":"em_andamento","prazo":""},{"prioridade":"alta","descricao":"Capacitar o Matheus para captações Standard de forma autônoma","status":"pendente","prazo":""},{"prioridade":"alta","descricao":"Padronizar planilha de custos com aluguel de equipamento embutido","status":"em_andamento","prazo":""},{"prioridade":"alta","descricao":"Trocar 6 clientes pequenos por 4 clientes do plano de R$10k","status":"em_andamento","prazo":""},{"prioridade":"media","descricao":"Definir 3 ICPs claros e meta de 5 prospects/dia","status":"pendente","prazo":""},{"prioridade":"media","descricao":"Adquirir escritório físico — cultura e profissionalismo","status":"em_andamento","prazo":""}],"direcao":"Próximo estágio: escala regional → nacional. Vocês já têm o que falta nos outros — processo escrito, custo-hora, planos produtizados, BDR e organograma. O crescimento destrava com dois movimentos simultâneos: subir o pró-labore para R$10k cada já no Q2 (mesmo apertando o reinvestimento) e quebrar a barreira de cobrar R$50k+ em projeto pontual. Cobrar R$2,5k em recorrência é o teto — para subir o ticket médio, o ICP precisa subir junto.","trilha":["precificar-valor","recorrencia","prospeccao","posicionamento"],"diag":{"handle":"@arco_filmes","redes":["A conta de vocês é a mais “marca” do grupo em disciplina: 4.378 seguidores, seguindo apenas 2 e 58 posts. O posicionamento é claro e moderno — “Audiovisual + AI”, foco em conteúdo digital, com pegada internacional.","A comunicação transmite inovação e volume de conteúdo — eficiência e modernidade são o fio condutor."],"cruzamento":["Há uma tensão de posicionamento. A marca de vocês online vende “conteúdo digital + AI” — volume e eficiência — enquanto a estratégia quer subir para o projeto institucional premium de R$ 50–120k (direção criativa e método, não diárias).","“Focused on digital content” tende a atrair o cliente de ticket baixo, o oposto do ICP premium que destrava o R$ 1M. Vocês têm público (4,4 mil) e disciplina de marca para sustentar as duas histórias — mas precisam decidir qual narrativa o Brasão vai inaugurar."],"ganhos":["Usar o Brasão (R$ 120k) como case hero institucional nas redes — provar publicamente que a Arco joga no ticket premium.","Criar um destaque “Institucional / Premium” separado do conteúdo digital, para o cliente de R$ 50k+ se enxergar.","Revisar a bio: manter o “AI” como diferencial e adicionar a camada premium (direção e método).","Mostrar bastidores de direção e método (o que justifica o ticket), não só o resultado de conteúdo.","Aproveitar o alcance para divulgar os planos Onstage/Pro/VIP — a recorrência já tem vitrine pronta."],"reflexao":["“Audiovisual + AI / digital content” atrai o cliente certo para o salto de R$ 50k+, ou comunica volume?","Como contar o case do Brasão nas redes para reposicionar a percepção de ticket?","Vale manter duas narrativas (conteúdo digital + institucional premium) ou eleger uma como principal?"]}},"BRAVA-X7QN":{"nome":"Brava Filmes","empresa":"Matheus (sócio único) · time: Gabriel + Muriel · Publicitário + Branded","momento":"estruturacao","metaFaturamentoMensal":60000,"resumo":"A Brava fatura R$470k/ano com fee recorrente de R$28,9k (21 criativos) e capacidade de entregar projetos de R$40-65k. O storytelling e a autoridade do Matheus abrem portas. O foco dos próximos 30 dias é organizar a base — separar PJ e PF, formalizar acordos com o time e passar a vender capacidade (hora), não vídeo — para a empresa rodar com previsibilidade.","maturidade":{"comercial":3,"operacao":4,"financeiro":2,"posicionamento":6,"lideranca":3,"gestao":3,"escalabilidade":3},"comercial":{"pipelineValor":0,"prospeccaoAtiva":false,"canalPrincipal":"Indicação + autoridade pessoal do Matheus"},"oportunidades":["Só separar PJ/PF + criar DRE por job já levanta a margem em 10-15% sem vender mais","Cliente Unimed em conversa — pode virar segundo fee mensal e dobrar a recorrência","Meta de 6 produções grandes/ano (vs 1 atual) é realista — a capacidade já existe","Mercado imobiliário e corporativo já validados — pipeline pode ser preenchido em 60 dias com Apollo"],"alavancas":[{"titulo":"Trocar a dívida tributária por previsibilidade (parcelar em 60x)","mecanismo":"O malabarismo mensal consome caixa imprevisível e energia. Parcelar R$35k em 60 meses (≈R$700/mês fixo) mata o estresse e libera o foco para vender projetos grandes em vez de apagar incêndio.","impacto":"Libera R$15-20k/ano em caixa imprevisível + 100% da energia estratégica"},{"titulo":"Reprecificar o fee pelo método, não pelo vídeo","mecanismo":"Fee atual: R$28,9k por 21 criativos (≈R$1.376/criativo). Com custo-hora real, a margem fica em ~30%. Subir para ~R$1.800/criativo, justificado por SLA + roteiro + Bible Criativa, leva a margem para ~45%.","impacto":"+R$8,9k/mês de margem real = +R$107k/ano com o mesmo cliente"},{"titulo":"1 produção grande/trimestre vendida com método consultivo","mecanismo":"A Brava já entrega R$40-65k, mas vende por sorte. Replicar com método: reunião de diagnóstico antes da proposta, deck por segmento e follow-up em 100% das propostas.","impacto":"+R$200k/ano sem ampliar capacidade (a capacidade ociosa já existe)"}],"plano":[{"prioridade":"maxima","descricao":"Reunião com o contador para parcelar a dívida tributária (60x ≈ R$700/mês)","status":"pendente","prazo":"7 dias"},{"prioridade":"maxima","descricao":"Calcular o custo-hora real para vender capacidade, não vídeo","status":"pendente","prazo":"15 dias"},{"prioridade":"maxima","descricao":"Reprecificar o fee Unimed (+20% por SLA + entregáveis)","status":"pendente","prazo":"30 dias"},{"prioridade":"maxima","descricao":"Separação PJ x PF + pró-labore fixo de R$15k","status":"atrasada","prazo":"01/05"},{"prioridade":"maxima","descricao":"Acordo escrito com Gabriel e Muriel (fixo x variável + cláusula de não atendimento direto)","status":"atrasada","prazo":"20/04"},{"prioridade":"maxima","descricao":"Criar DRE por job com timesheet — começar mesmo 'feio'","status":"em_andamento","prazo":""},{"prioridade":"alta","descricao":"Implementar o fluxo Brava 2.0 (Captação → Orçamento → Produção → Entrega → Follow-up)","status":"em_andamento","prazo":""},{"prioridade":"alta","descricao":"Deck institucional + rate card oficial","status":"pendente","prazo":"60 dias"},{"prioridade":"alta","descricao":"ICP claro para 2 segmentos (Publicitário + Eventos/Video Case)","status":"pendente","prazo":""},{"prioridade":"media","descricao":"CRM com 50 contas-alvo + cadência Apollo","status":"pendente","prazo":""}],"direcao":"A Brava está no ponto de virar de 'CPF que entrega' para 'CNPJ que roda'. Três movimentos em 30 dias: (1) PJ separada do PF com pró-labore fixo; (2) acordos escritos com Gabriel e Muriel; (3) primeiro job de R$40k+ vendido por método consultivo, não por indicação. O fee mensal dá conforto, mas é justamente ele que ocupa a capacidade que deveria estar livre para os projetos grandes. Organizar a base levanta a margem em 10-15% sem vender mais.","trilha":["pj-pf","custo-hora","precificar-valor","prospeccao","margem-dre"],"diag":{"handle":"@segueabrava","redes":["A presença de vocês ainda é embrionária: 246 seguidores e 12 posts. A conta existe, mas ainda não é um ativo de marca — sem cadência e sem prova social. O nome aparece como “Brava Content” (e não “Brava Filmes”) e o link vai para o Vimeo.","É um perfil em estágio inicial, descolado do peso real que a Brava tem no mercado."],"cruzamento":["O paradoxo da Brava: a autoridade que move o negócio está na pessoa do Matheus, não na marca. O Instagram da empresa é minúsculo perto do peso real de vocês — é um ativo de marca subaproveitado.","Importante: organizar a base (PJ/PF, custo-hora, acordos) continua sendo a prioridade número 1 — as redes entram depois. Mas vale saber que o método consultivo que vocês querem vender ganha muito com prova social pública (cases e bastidores de processo)."],"ganhos":["Alinhar o nome: “Brava Content” vs “Brava Filmes” — definir uma identidade só.","Canalizar a autoridade do Matheus: transformar o que ele já fala em conteúdo da marca, não só do perfil pessoal.","Publicar 1–2 cases dos projetos de R$ 40–65k como prova do método (apoia vender método, não vídeo).","Bio com nicho e método: hoje “virar um filme” é genérico; diga para quem e como.","Definir uma cadência mínima (ex.: 1 post/semana) quando chegar a hora — sem pressa, a base vem primeiro."],"reflexao":["A autoridade da Brava está no Matheus ou na marca? Faz sentido investir no Instagram da empresa agora?","O método consultivo que vocês querem vender precisa de prova social pública — as redes podem ser essa vitrine?","Lembrete: organizar a base (PJ/PF, custo-hora) vem antes; redes são um movimento posterior."]}},"DUNAS-R5VW":{"nome":"Dunas Filmes","empresa":"Felipe + Pâmela · Rio de Janeiro · Indústria/Saúde/Educação","momento":"sobrevivencia","metaFaturamentoMensal":60000,"resumo":"A Dunas fatura R$500k/ano com capacidade técnica comprovada (já entregou jobs de R$120k). O talento existe — o que falta é processo e previsibilidade. O foco agora é tirar o Felipe do centro de tudo, dar autonomia real à Pâmela e criar uma oferta recorrente que vire o piso financeiro do negócio.","maturidade":{"comercial":2,"operacao":3,"financeiro":2,"posicionamento":3,"lideranca":3,"gestao":2,"escalabilidade":2},"comercial":{"pipelineValor":0,"prospeccaoAtiva":false,"canalPrincipal":"100% indicação / WhatsApp"},"oportunidades":["RJ tem demanda forte em saúde, educação e indústria — pouco atendido por boutiques estruturadas","Capacidade técnica comprovada (já fez R$120k) — falta vender com método","Possível parceiro comercial (Tiago) — porta de entrada para agências","Produto recorrente de R$25k/mês em 3 meses dobra a tranquilidade"],"alavancas":[{"titulo":"Pacote Vídeo Mensal R$3,5k × 5 clientes = R$17,5k MRR em 90 dias","mecanismo":"Produto recorrente simples e padronizado (4 vídeos curtos + 1 institucional/trimestre), com escopo escrito e não-negociável. Vende para clínicas médicas do RJ e universidades.","impacto":"+R$17,5k MRR (R$210k/ano) = piso financeiro que sustenta a operação"},{"titulo":"Pâmela como Gerente de Conta libera 20h/semana do Felipe","mecanismo":"Hoje o fluxo é cliente→Pâmela→Felipe→Pâmela→cliente. A Pâmela passa a decidir 80% das interações (o Felipe só vê quando aprovar criativo), recuperando ~4h/dia do Felipe.","impacto":"20h/semana liberadas viabilizam 2h/dia de prospecção = 8-10 reuniões qualificadas/mês"},{"titulo":"Especialização em 1 nicho (clínicas médicas RJ)","mecanismo":"Especializar em clínicas premium de Botafogo/Leblon/Barra cria portfólio repetível, vocabulário de venda e indicação orgânica — em vez de aprender um setor novo a cada cliente.","impacto":"Ticket médio R$18k → R$25k em 6 meses + ciclo de venda 50% mais rápido"}],"plano":[{"prioridade":"maxima","descricao":"Estruturar a oferta 'Pacote Vídeo Mensal' R$3,5k com escopo escrito","status":"pendente","prazo":"15 dias"},{"prioridade":"maxima","descricao":"Pâmela assume a comunicação de 3 clientes-piloto (cliente fala só com ela)","status":"pendente","prazo":"15 dias"},{"prioridade":"maxima","descricao":"Felipe em 2h/dia de prospecção Apollo (clínicas médicas + universidades RJ)","status":"pendente","prazo":"imediato"},{"prioridade":"maxima","descricao":"Separação PJ x PF + pró-labore fixo (mín. R$7-10k Felipe)","status":"pendente","prazo":"30 dias"},{"prioridade":"maxima","descricao":"Criar ICP claro para 2 segmentos (Saúde + Educação)","status":"pendente","prazo":""},{"prioridade":"alta","descricao":"Contratar 1 editor fixo (R$1,5-2,5k)","status":"pendente","prazo":""},{"prioridade":"alta","descricao":"Lista Apollo: 150 leads no RJ (saúde + educação + indústria)","status":"pendente","prazo":"60 dias"},{"prioridade":"media","descricao":"Reduzir a participação do Felipe nos projetos de 100% para 30%","status":"pendente","prazo":""}],"direcao":"O ponto de virada da Dunas é sair da 'sobrevivência confortável'. Três movimentos em 30 dias: (1) pró-labore fixo + separação PJ/PF — sem isso o financeiro nunca fecha; (2) a Pâmela assume oficialmente a gestão dos clientes-piloto, com poder de decisão real; (3) primeiro contrato recorrente de R$3k+ fechado, para criar previsibilidade. O caminho não é mais clientes — é menos clientes e mais método.","trilha":["pj-pf","recorrencia","delegar","prospeccao","posicionamento"],"diag":{"handle":"@dunasfilmes","redes":["A conta de vocês é ativa (83 posts) e razoavelmente seguida (1.737), com destaques organizados (Portfólio, Bastidores, Equipe, Festivais, Quem somos). Dois sinais de atenção: vocês seguem 772 contas — proporção que sugere crescimento por follow-back — e a bio é ampla: “live streaming, eventos e conteúdos” abrange tudo.","Há também um detalhe de capricho: o destaque “Portifólio” está escrito com erro."],"cruzamento":["O Instagram é o retrato fiel do diagnóstico: generalista. “Live streaming, eventos e conteúdos” é exatamente o “fazemos de tudo” que mantém a Dunas em sobrevivência — quem fala com todo mundo não vira referência para ninguém.","A estratégia pede o oposto: um nicho (saúde/clínicas premium do RJ), método e foco. A boa notícia: a base de conteúdo de vocês (83 posts, destaques estruturados) é matéria-prima suficiente para reposicionar sem começar do zero."],"ganhos":["Estreitar a bio para um nicho: trocar “live streaming, eventos e conteúdos” por foco em saúde/clínicas premium do RJ.","Corrigir o destaque “Portifólio” → “Portfólio” — capricho vira percepção de qualidade premium.","Criar um destaque por nicho (ex.: “Clínicas / Saúde”) com os trabalhos do setor-alvo.","Parar de crescer por follow-back e reduzir o “seguindo” — autoridade vale mais que número.","Usar a rede para a oferta recorrente: comunicar o “Pacote Vídeo Mensal” como produto."],"reflexao":["Vocês fazem “de tudo” nas redes e na venda. Qual nicho topariam assumir publicamente primeiro?","O Instagram pode ser o primeiro lugar onde o reposicionamento para saúde/clínicas vira concreto?","Vale um pente-fino de capricho (erro no destaque, seguir 772 contas) antes de prospectar premium?"]}},"F3-B2HD":{"nome":"F3 Imagens","empresa":"Tiago Ferraz · Curitiba/PR · Treinamento técnico 3D","momento":"estruturacao","metaFaturamentoMensal":75000,"resumo":"A F3 tem 16 anos de história e já chegou a R$1,1M/ano. Não é uma produtora iniciante — é uma produtora em retomada, com produto validado (3D técnico) e ICP claro (indústria/treinamento). O que falta é religar o motor comercial: prospecção ativa, posicionamento atualizado e reativação da base premium.","maturidade":{"comercial":2,"operacao":5,"financeiro":3,"posicionamento":5,"lideranca":5,"gestao":4,"escalabilidade":3},"comercial":{"pipelineValor":0,"prospeccaoAtiva":false,"canalPrincipal":"Indicação + autoridade pessoal do Tiago"},"oportunidades":["Comunicação interna corporativa é um mercado grande, pouco disputado e muito lucrativo","Homologação via Compras cria ativo de longo prazo (vira fornecedor de quem gera job)","Base de clientes inativos é mina subaproveitada — Vale Irrigação (8 anos de relação) pode voltar","IA + interatividade como camada de valor — a F3 tem olhar técnico forte para liderar isso"],"alavancas":[{"titulo":"Homologação primeiro, venda depois (entrar como fornecedor em Compras)","mecanismo":"Focar 60 dias só em cadastrar a F3 nos departamentos de Compras de 50 indústrias 500+ func. Quando o Treinamento/L&D tiver demanda, a F3 entra como opção pré-aprovada, sem briga de preço.","impacto":"5-10 leads inbound qualificados/ano = 1-3 contratos premium = R$100-300k/ano"},{"titulo":"Pacote Treinamento Visual 3D produtizado","mecanismo":"A F3 já entrega 3D técnico em escala. Produtizar como SKU: 5 vídeos/mês × R$10-15k = recorrência previsível, vendida para Compras + L&D industrial.","impacto":"4-5 clientes recorrentes em 12 meses = R$50-75k MRR (R$600-900k/ano)"},{"titulo":"Reativação de clientes inativos premium (Vale Irrigação e similares)","mecanismo":"Cliente de 8 anos parou porque o relacionamento dependia do Tiago. Café + diagnóstico gratuito + proposta de pacote anual usa o histórico como vantagem impossível de copiar.","impacto":"+R$80-150k/ano em jobs recuperados (3-5 clientes reativados)"}],"plano":[{"prioridade":"maxima","descricao":"Ligar para Vale Irrigação + 3 clientes inativos premium para reativação","status":"pendente","prazo":"7 dias"},{"prioridade":"maxima","descricao":"Cadastro em Compras de 50 indústrias 500+ func (Sul/Sudeste)","status":"pendente","prazo":"60 dias"},{"prioridade":"maxima","descricao":"Produtizar 'Pacote Treinamento Visual 3D' como SKU fixo","status":"pendente","prazo":"30 dias"},{"prioridade":"maxima","descricao":"Reescrever posicionamento: 'Parceira de comunicação técnica e treinamento'","status":"em_andamento","prazo":"45 dias"},{"prioridade":"maxima","descricao":"Limpar portfólio: manter 3D técnico/industrial, remover institucional genérico","status":"pendente","prazo":"10 dias"},{"prioridade":"alta","descricao":"Contratar BDR (perfil agressivo, vendas difíceis)","status":"pendente","prazo":"60 dias"},{"prioridade":"alta","descricao":"Jogo duplo: cadastrar em Compras + abordar L&D/Operações","status":"pendente","prazo":""},{"prioridade":"media","descricao":"Padronizar produções com a Nati (fluxo, checklists)","status":"pendente","prazo":""}],"direcao":"A F3 é o único caso que já viveu o estágio que está buscando reconquistar — isso é uma vantagem e tanto. Próximo estágio: voltar ao Crescimento. Três movimentos: (1) posicionamento novo escrito ('parceira de comunicação técnica e treinamento'); (2) BDR com perfil agressivo (não SDR genérico); (3) primeiro cliente industrial novo homologado via estratégia de Compras. Voltar não é repetir o que era antes — é fazer melhor com a clareza do que tirou o foco da empresa.","trilha":["prospeccao","posicionamento","recorrencia","custo-hora"],"diag":{"handle":"@f3imagens","redes":["A conta de vocês tem mais posts que qualquer outra do grupo (242) — coerente com os 16 anos de história. Tem site próprio na bio (sinal de maturidade) e foco em resultado (“vídeos que vendem por você”).","Por outro lado, 1.187 seguidores é pouco para esse volume e tempo de casa, e seguir 865 contas sugere esforço de crescimento sem tração de autoridade. A bio mistura “3D, institucionais e treinamentos”."],"cruzamento":["Há uma contradição direta entre a bio e a estratégia. O plano manda remover o “institucional genérico” e cravar o 3D técnico/treinamento como nicho premium — mas a bio ainda lista “institucionais”.","A F3 comunica generalismo numa fase que exige especialização. O ativo é real (242 posts, site, histórico), mas a vitrine dilui o que vocês têm de mais valioso e defensável: o 3D técnico industrial, raro e pouco disputado."],"ganhos":["Reescrever a bio para o nicho premium: tirar “institucionais” e cravar “3D técnico e treinamento para a indústria”.","Curar o feed e os destaques: deixar à mostra os melhores 3D técnicos/treinamentos e arquivar o institucional genérico.","Criar destaques “Treinamento 3D” e “Industrial” — hoje só existe “Produtora”.","Usar o histórico como autoridade: conteúdo “16 anos / cases de indústria” para sustentar a homologação via Compras.","Tornar a reativação visível: transformar um case recuperado (ex.: Vale Irrigação) em prova pública."],"reflexao":["A bio ainda diz “institucionais”. O que falta para a F3 assumir publicamente que é especialista em 3D técnico e treinamento?","O feed atual ajuda ou atrapalha a percepção premium que a homologação em Compras exige?","Os 16 anos estão sendo usados como autoridade nas redes, ou ficam implícitos demais?"]}},"POLIVERSO-T8FY":{"nome":"Poliverso Filmes","empresa":"Bruno & Felipe · Porto Alegre/RS · Audiovisual digital + Garffo","momento":"crescimento","metaFaturamentoMensal":100000,"resumo":"A Poliverso tem o maior faturamento do grupo (R$1M + R$180k da Garffo) e algo raro: dois motores rodando — projeto pontual premium e recorrência. Time de 5 + freelas. O próximo passo é destravar a centralização nos sócios e padronizar o processo antes que o volume comprometa a margem.","maturidade":{"comercial":4,"operacao":6,"financeiro":4,"posicionamento":6,"lideranca":5,"gestao":4,"escalabilidade":5},"comercial":{"pipelineValor":450000,"prospeccaoAtiva":false,"canalPrincipal":"Indicação + agências (BDR em ativação)"},"oportunidades":["Modelo Garffo (recorrência) prova que pacote mensal funciona — replicar em moda, varejo e indústria","Porto Alegre = produção barata → pode virar hub para projetos nacionais (RJ/SP)","Marcas validadas (Renner, Dakota, Tramontina, Sicredi) — case forte para subir ticket","Pós-produção como produto separado (margem alta e previsível)"],"alavancas":[{"titulo":"Garffo 2.7x: replicar o modelo recorrente em moda + varejo + indústria","mecanismo":"A Garffo prova que o pacote mensal funciona (R$180k/ano em alimentar). Replicar em 3 clusters novos (Moda, Varejo, Indústria) com a mesma estrutura operacional e novo mercado.","impacto":"Garffo R$180k → R$500k/ano em 12 meses (+R$320k) com o mesmo time"},{"titulo":"Dani aprovando até R$50k libera o Bruno para deals de R$80-120k","mecanismo":"Hoje o Bruno fecha desde R$3k até R$120k. Realocar: a Dani aprova até R$50k (60% do volume, 30% do faturamento) e o Bruno foca nos deals de R$50k+, onde a hora dele rende 5x mais.","impacto":"+30% de propostas/mês + 2 deals premium/mês a mais = +R$200k/ano"},{"titulo":"Pós-produção verticalizada como produto separado","mecanismo":"O time interno de pós tem capacidade ociosa entre projetos. Oferecer color/sound/finalização para produtoras menores, com margem alta (tempo já contratado).","impacto":"+R$15-20k MRR (R$200k/ano) com margem ~80% = +R$160k de lucro/ano"}],"plano":[{"prioridade":"maxima","descricao":"Dani aprova orçamentos até R$50k sem o Bruno — formalizar autonomia","status":"em_andamento","prazo":"30 dias"},{"prioridade":"maxima","descricao":"3 propostas Garffo-style para moda (Renner, Dakota, Youcom)","status":"pendente","prazo":"45 dias"},{"prioridade":"maxima","descricao":"Calcular margem real dos últimos 6 meses para precificar com mín. 30%","status":"em_andamento","prazo":"30 dias"},{"prioridade":"maxima","descricao":"Contratar BDR (R$1.800 fixo + R$80/reunião qualificada + 3,3% sobre 1º trabalho)","status":"em_andamento","prazo":"30 dias"},{"prioridade":"maxima","descricao":"Definir 3 ICPs claros para prospecção","status":"pendente","prazo":"30 dias"},{"prioridade":"alta","descricao":"Fluxo Poliverso 2.0 escrito (entrada → entrega) com responsável por etapa","status":"em_andamento","prazo":""},{"prioridade":"alta","descricao":"Time Sheet ClickUp + medir horas por pessoa","status":"em_andamento","prazo":""},{"prioridade":"alta","descricao":"Apollo + cadência ativa de prospecção (Bruno + BDR)","status":"pendente","prazo":"60 dias"},{"prioridade":"media","descricao":"NPS com os principais clientes 2025 (meta 80% de resposta)","status":"pendente","prazo":""}],"direcao":"Próximo estágio: Escala. Três movimentos: (1) BDR + Dani aprovando orçamentos liberam o Bruno do comercial-tudo e o Felipe do operacional-tudo; (2) padronizar o processo Poliverso 2.0 antes que o volume estoure a margem; (3) decidir a narrativa — boutique premium ou máquina de conteúdo (os dois cabem, mas o mercado precisa de clareza). Crescer R$1M com 15% de margem vale menos que crescer R$500k com 35%: a meta de R$2M só compensa com processo.","trilha":["delegar","margem-dre","recorrencia","prospeccao","posicionamento"],"diag":{"handle":"@poliversofilms","redes":["A conta de vocês é forte e profissional: 3.523 seguidores, 141 posts e — o ativo mais valioso — destaques com marcas-âncora (RedBull, Gatorade, Renner, Multiplan, Ashua, Appmax). Isso é prova social de primeira linha, exatamente o que sustenta ticket alto.","O posicionamento “para marcas exigentes” reforça o premium; o sufixo “no Digital · Produção · Foto · Filme · Conteúdo” puxa para um cardápio amplo."],"cruzamento":["As redes confirmam a força e a ambiguidade que a estratégia aponta. Os destaques de marca premium dizem “boutique de marcas exigentes”; mas “no Digital · Foto · Filme · Conteúdo” puxa para “máquina de conteúdo” — a exata indecisão de narrativa do diagnóstico.","Além disso, o segundo motor de vocês — a recorrência (modelo Garffo), a maior alavanca de crescimento — está invisível nas redes. A vitrine mostra os grandes projetos pontuais, não o produto recorrente que vocês querem replicar."],"ganhos":["Decidir e cravar a narrativa na bio: “boutique audiovisual para marcas exigentes” como fio condutor — sem listar “foto/filme/conteúdo” como cardápio.","Dar vitrine ao motor recorrente (Garffo): conteúdo/destaque sobre o pacote mensal — é a alavanca de +R$ 320k/ano e hoje não aparece.","Transformar as marcas-âncora em cases narrados (não só logos): “como fizemos para a Renner/RedBull”.","Mostrar processo e método (o que justifica preço), apoiando a margem mínima de 30%.","Usar a autoridade da rede para abrir os 3 ICPs novos de prospecção (moda/varejo/indústria)."],"reflexao":["Boutique premium ou máquina de conteúdo? A bio precisa escolher — qual narrativa vocês querem no mercado?","O modelo Garffo é a maior alavanca e não aparece nas redes. Como dar vitrine à recorrência?","As marcas-âncora estão como logo — viram case narrado para puxar o ticket?"]}},"PROVOKE-J4ZC":{"nome":"Provoke","empresa":"Matheus Piai + Matheus Vinhas + Victor · São Paulo · Branded autoral","momento":"estruturacao","metaFaturamentoMensal":70000,"resumo":"A Provoke tem a coisa mais difícil de construir: linguagem autoral reconhecida. Estrutura societária saudável e complementar (Piai comercial, Vinhas operação, Victor criação). O foco agora é transformar esse DNA em vendas previsíveis — documentar o método, criar cadência comercial e formalizar os gates criativos que eliminam retrabalho.","maturidade":{"comercial":3,"operacao":5,"financeiro":3,"posicionamento":7,"lideranca":5,"gestao":3,"escalabilidade":3},"comercial":{"pipelineValor":120000,"prospeccaoAtiva":false,"canalPrincipal":"Indicação + circuito artístico SP"},"oportunidades":["Demanda crescente por conteúdo de marca autoral — espaço aberto para boutique premium","Marcas médias e influenciadores investindo em filmes de qualidade — match com o DNA da Provoke","Relacionamento com o meio musical/cultural de SP é ativo subaproveitado","1-2 projetos 'hero' por ano podem consolidar reputação e dobrar o ticket médio"],"alavancas":[{"titulo":"Vender método, não vídeo: 'Provoke Method' precificado +30%","mecanismo":"Documentar como método único: Bible Criativa por cliente + 3 gates (Conceito → Roteiro → Offline) + Lookbook. Apresentar em todas as propostas e subir o ticket justificado por método, não por equipamento.","impacto":"Ticket R$35k → R$45k = +R$120k/ano sem trabalho operacional adicional"},{"titulo":"Primeiro pack recorrente social-first (R$8-10k/mês)","mecanismo":"A Provoke tem DNA forte em social-first mas vende projeto a projeto. Validar 1 cliente piloto em pack mensal (8 reels + 4 stories) e usar como case para fechar mais 2-3 em 6 meses.","impacto":"3 clientes × R$9k/mês = R$27k MRR = +R$324k/ano de receita previsível"},{"titulo":"Pós-produção como produto lateral","mecanismo":"O Vinhas tem skill técnica forte em pós. Vender finalização (color, sound, master) para produtoras menores — receita lateral previsível que não compete com o posicionamento autoral.","impacto":"+R$5-10k/mês com margem ~70% = R$60-120k/ano complementar"}],"plano":[{"prioridade":"maxima","descricao":"Documentar o 'Provoke Method' em 1 página (Bible + 3 gates + Lookbook)","status":"em_andamento","prazo":"17/01"},{"prioridade":"maxima","descricao":"Piloto de cliente social-first recorrente R$8-10k/mês","status":"pendente","prazo":"60 dias"},{"prioridade":"maxima","descricao":"Bible Criativa por cliente vira entregável padrão nas propostas","status":"pendente","prazo":"30 dias"},{"prioridade":"maxima","descricao":"Definir ICP por 2 segmentos (Publicitário + Eventos/Video Case)","status":"em_andamento","prazo":"17/01"},{"prioridade":"maxima","descricao":"Playbook de responsabilidades por área (Financeiro: Piai · Pós: Vinhas · MKT: Victor)","status":"em_andamento","prazo":"15/12"},{"prioridade":"alta","descricao":"Time Sheet ClickUp — medir horas vendidas vs utilizadas","status":"pendente","prazo":"60 dias"},{"prioridade":"alta","descricao":"Ativar cadência Apollo + homologação via Compras","status":"pendente","prazo":"17/01"},{"prioridade":"alta","descricao":"Lookbook de referência (Victor + Vinhas)","status":"pendente","prazo":"60 dias"},{"prioridade":"media","descricao":"Checklists por fase + template de cronograma (Vinhas)","status":"pendente","prazo":""}],"direcao":"Próximo estágio: Crescimento. Três movimentos nos primeiros 60 dias: (1) ICP de 2 segmentos fechado; (2) cadência ativa de prospecção, para o Piai deixar de ser o único vendedor; (3) gates criativos formais (Conceito → Roteiro → Offline) com aprovação do Victor, que resolvem retrabalho e ruído entre os sócios. DNA criativo forte só vira vantagem competitiva quando o mercado consegue comprar de forma previsível.","trilha":["precificar-valor","recorrencia","prospeccao","custo-hora"],"diag":{"handle":"@prvk.art","redes":["A marca de vocês é a mais forte do grupo em magnetismo: 13,4 mil seguidores com apenas 51 posts — altíssima atração por post. Estética de creative studio internacional, bilíngue, tom autoral e cool.","Isso confirma na prática o que é mais difícil de construir: linguagem autoral reconhecida. A bio, porém, é cool mas críptica — não diz o que a Provoke faz nem para quem."],"cruzamento":["Vocês têm um problema invejável e perigoso: audiência grande, motor comercial pequeno. 13,4 mil seguidores é um público que a maioria das produtoras sonha — mas ele não está virando pipeline previsível (a venda ainda é projeto a projeto, por indicação).","O ativo de marca está construído; falta o sistema que transforma atenção em receita. Dois detalhes reforçam: a bio é estética mas não vende, e há fragmentação de marca (prvk.art, “Provoke Art”, provokearts.com). A maior oportunidade de vocês em “redes → receita” mora aqui."],"ganhos":["Adicionar caminho de conversão claro: a bio precisa dizer o que vocês oferecem e ter um CTA.","Unificar a marca: prvk.art / Provoke Art / provokearts.com — uma identidade só.","Lançar o pack recorrente social-first (R$ 8–10k/mês) usando a própria audiência como vitrine e canal.","Converter parte dos 13,4 mil em pipeline: conteúdo com chamada para diagnóstico/contato, não só portfólio.","Empacotar o “Provoke Method” como conteúdo público — vender método (e ticket +30%) também se constrói na rede."],"reflexao":["Vocês têm 13,4 mil seguidores e vendem por indicação. O que falta para a audiência virar pipeline?","A bio é linda mas não diz o que vocês fazem — vale uma camada que converta sem perder o tom autoral?","prvk.art vs Provoke Art vs provokearts.com — unificar a marca ajudaria a vender?"]}},"TRUCO-N6KS":{"nome":"Truco Films","empresa":"Isabela & Luiz · Alphaville/SP · Documental + Branded","momento":"estruturacao","metaFaturamentoMensal":80000,"resumo":"A Truco tem storytelling forte, cases premium (Einstein, Faber-Castell) e R$670k/ano com recorrência já validada. O desafio é o clássico de boutique de qualidade: a venda sempre veio por indicação. O foco agora é construir um motor comercial ativo e dobrar a recorrência, reduzindo a concentração em poucos clientes.","maturidade":{"comercial":3,"operacao":6,"financeiro":4,"posicionamento":7,"lideranca":6,"gestao":4,"escalabilidade":4},"comercial":{"pipelineV const MESES = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];

// ===== HELPERS =====
function fmtBRL(v){ if(v===""||v==null) return "—"; const n=parseFloat(v); if(isNaN(n)) return "—";
  if(Math.abs(n)>=1000) return "R$ "+(n/1000).toLocaleString("pt-BR",{maximumFractionDigits:1})+"k";
  return "R$ "+n.toLocaleString("pt-BR",{maximumFractionDigits:0}); }
function fmtBRLfull(v){ if(v===""||v==null) return "—"; const n=parseFloat(v); if(isNaN(n)) return "—";
  return "R$ "+n.toLocaleString("pt-BR",{minimumFractionDigits:0,maximumFractionDigits:2}); }
function fmtPct(v){ if(v===""||v==null||v==="") return "—"; const n=parseFloat(v); if(isNaN(n)) return "—"; return n+"%"; }
function mesLabel(k){ if(!k) return "—"; const [y,m]=k.split("-"); const i=parseInt(m,10)-1; return (MESES[i]||"?")+"/"+y; }
function esc(s){ return (s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c])); }
function timeAgo(iso){ if(!iso) return "—"; const d=new Date(iso); const diff=(Date.now()-d.getTime())/1000;
  if(diff<60) return "agora"; if(diff<3600) return Math.floor(diff/60)+" min atrás";
  if(diff<86400) return Math.floor(diff/3600)+"h atrás"; const days=Math.floor(diff/86400);
  if(days===1) return "ontem"; if(days<30) return days+" dias atrás";
  return d.toLocaleDateString("pt-BR"); }

// ===== AUTH =====
function getSession(){ try{ return JSON.parse(localStorage.getItem(SESSION_KEY)||"null"); }catch(e){ return null; } }
function setSession(s){ localStorage.setItem(SESSION_KEY, JSON.stringify(s)); }
function clearSession(){ localStorage.removeItem(SESSION_KEY); }

async function login(email, password){
  const r = await fetch(SUPABASE_URL+"/auth/v1/token?grant_type=password", {
    method:"POST",
    headers:{ "apikey":SUPABASE_ANON_KEY, "Content-Type":"application/json" },
    body: JSON.stringify({ email, password })
  });
  const j = await r.json();
  if(!r.ok){ throw new Error(j.error_description || j.msg || j.error || ("Falha no login ("+r.status+")")); }
  const sess = { access_token:j.access_token, refresh_token:j.refresh_token,
    expires_at: Date.now() + (j.expires_in||3600)*1000, email };
  setSession(sess);
  return sess;
}
async function refreshSession(){
  const s = getSession(); if(!s||!s.refresh_token) return null;
  const r = await fetch(SUPABASE_URL+"/auth/v1/token?grant_type=refresh_token", {
    method:"POST",
    headers:{ "apikey":SUPABASE_ANON_KEY, "Content-Type":"application/json" },
    body: JSON.stringify({ refresh_token:s.refresh_token })
  });
  if(!r.ok){ clearSession(); return null; }
  const j = await r.json();
  const sess = { access_token:j.access_token, refresh_token:j.refresh_token,
    expires_at: Date.now()+(j.expires_in||3600)*1000, email:s.email };
  setSession(sess); return sess;
}
async function validToken(){
  let s = getSession(); if(!s) return null;
  if(Date.now() > s.expires_at - 60000){ s = await refreshSession(); }
  return s;
}

// ===== DATA =====
async function fetchSubmissions(){
  let s = await validToken();
  if(!s) throw new Error("Sessão expirada");
  const r = await fetch(SUPABASE_URL+"/rest/v1/submissions?select=*&order=created_at.desc", {
    headers:{ "apikey":SUPABASE_ANON_KEY, "Authorization":"Bearer "+s.access_token }
  });
  if(r.status===401){ const ns=await refreshSession(); if(!ns) throw new Error("Sessão expirada");
    return fetchSubmissions(); }
  if(!r.ok){ throw new Error("Erro ao buscar dados ("+r.status+")"); }
  return r.json();
}

// agrupa por mentee_code; pega submissão mais recente como atual; junta financeiroMeses de todas
function groupByMentee(rows){
  const map = {};
  rows.forEach(row=>{
    if(!row.mentee_code) return;
    if(String(row.mentee_code).toUpperCase().startsWith("TESTE")) return;
    const code = row.mentee_code;
    if(!map[code]) map[code] = { code, nome:row.mentee_name, submissions:[], finMerged:{} };
    map[code].submissions.push(row);
  });
  Object.values(map).forEach(g=>{
    g.submissions.sort((a,b)=> new Date(b.created_at)-new Date(a.created_at));
    g.latest = g.submissions[0];
    // merge histórico financeiro (submissões mais antigas primeiro, recentes sobrescrevem)
    [...g.submissions].reverse().forEach(sub=>{
      const fm = (sub.data&&sub.data.financeiroMeses)||{};
      Object.keys(fm).forEach(k=>{ g.finMerged[k] = fm[k]; });
    });
  });
  return map;
}

function currentFin(g){
  const d = g.latest.data||{};
  const ref = g.latest.mes_ref;
  const fm = g.finMerged||{};
  if(ref && fm[ref] && (fm[ref].faturamento)) return { mes:ref, ...fm[ref] };
  // fallback: último mês com faturamento
  const meses = Object.keys(fm).filter(k=> fm[k] && parseFloat(fm[k].faturamento)>0).sort();
  if(meses.length){ const k=meses[meses.length-1]; return { mes:k, ...fm[k] }; }
  return { mes:ref };
}
function taskStats(g){
  const t = (g.latest.data&&g.latest.data.tarefas)||[];
  const total=t.length; const feito=t.filter(x=>x.status==="feito"||x.status==="concluida").length;
  const atrasado=t.filter(x=>x.status==="atrasado"||x.status==="atrasada").length;
  return { total, feito, atrasado, pct: total? Math.round(feito/total*100):0 };
}
function ocupacao(g){
  const h=(g.latest.data&&g.latest.data.horas)||{};
  if(h.total&&h.faturaveis&&parseFloat(h.total)>0) return Math.round(parseFloat(h.faturaveis)/parseFloat(h.total)*100);
  return null;
}

function moneyMask(s){
  s = String(s==null?"":s).replace(/[^\d,]/g,"");
  const i = s.indexOf(",");
  if(i!==-1) s = s.slice(0,i+1) + s.slice(i+1).replace(/,/g,"");
  if(s==="") return "";
  let parts = s.split(","); let ip = parts[0], dp = parts[1];
  ip = (ip||"").replace(/^0+(?=\d)/,"");
  if(ip==="" && dp===undefined) return "";
  if(ip==="") ip = "0";
  ip = ip.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
  let out = "R$ " + ip;
  if(dp!==undefined) out += "," + dp.slice(0,2);
  return out;
}
function moneyParse(s){
  s = String(s==null?"":s).replace(/[^\d,]/g,"").replace(",", ".");
  if(s==="") return "";
  const n = parseFloat(s);
  return isNaN(n) ? "" : n;
}
function moneyInit(v){
  if(v==null || v==="") return "";
  const n = parseFloat(v); if(isNaN(n)) return "";
  return "R$ " + n.toLocaleString("pt-BR", {maximumFractionDigits:2});
}
document.addEventListener("input", e=>{ const t=e.target; if(t&&t.classList&&t.classList.contains("money")){ t.value=moneyMask(t.value); } });

function strategicDiagHTML(code){
  const c = MENTEE_CONTENT[code]; if(!c) return '';
  const up = "font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-faint);font-weight:600;margin:10px 0 4px";
  const ps = a => (a||[]).map(p=>`<p style="margin:0 0 8px;font-size:13px;line-height:1.6">${esc(p)}</p>`).join('');
  const lis = a => '<ul style="margin:0;padding-left:18px">'+(a||[]).map(p=>`<li style="font-size:13px;line-height:1.5;margin-bottom:5px">${esc(p)}</li>`).join('')+'</ul>';
  let h = '';
  if(c.diag){
    const d = c.diag;
    h += `<div class="sect"><h3>Diagnóstico de redes${d.handle?' · '+esc(d.handle):''}</h3>`;
    if(d.redes&&d.redes.length){ h += `<div style="${up};margin-top:0">O que o Instagram diz hoje</div>${ps(d.redes)}`; }
    if(d.cruzamento&&d.cruzamento.length){ h += `<div style="${up}">Onde redes e estratégia se cruzam</div>${ps(d.cruzamento)}`; }
    if(d.ganhos&&d.ganhos.length){ h += `<div style="${up}">Ganhos rápidos</div>${lis(d.ganhos)}`; }
    if(d.reflexao&&d.reflexao.length){ h += `<div style="${up}">Para refletir</div>${lis(d.reflexao)}`; }
    h += `</div>`;
  }
  h += `<div class="sect"><h3>Estratégia (mapa mental)</h3>`;
  h += `<div class="muda"><div class="row"><span class="lbl">Momento / meta</span>${esc(c.momento||'—')} · meta ${fmtBRL(c.metaFaturamentoMensal)}</div>`;
  if(c.resumo) h += `<div class="row"><span class="lbl">Resumo</span>${esc(c.resumo)}</div>`;
  if(c.direcao) h += `<div class="row"><span class="lbl">Direção estratégica</span>${esc(c.direcao)}</div>`;
  h += `</div>`;
  if(c.oportunidades&&c.oportunidades.length){ h += `<div style="${up}">Oportunidades</div>${lis(c.oportunidades)}`; }
  if(c.alavancas&&c.alavancas.length){
    h += `<div style="${up}">Alavancas de ganho</div>` + c.alavancas.map(a=>`<div class="row" style="margin-bottom:8px;padding:10px 12px;background:var(--surface-alt);border-radius:8px;border:1px solid var(--border)"><b>${esc(a.titulo)}</b><div style="font-size:12.5px;color:var(--text-muted);margin-top:3px">${esc(a.mecanismo)}</div><div style="font-size:12.5px;color:var(--green);margin-top:3px">${esc(a.impacto)}</div></div>`).join('');
  }
  if(c.plano&&c.plano.length){
    h += `<div style="${up}">Plano estratégico</div><ul style="margin:0;padding-left:18px">` + c.plano.map(p=>`<li style="font-size:13px;line-height:1.5;margin-bottom:5px"><b style="color:var(--accent)">[${esc((p.prioridade||'').toUpperCase())}]</b> ${esc(p.descricao)}${p.prazo?` <span class="dim">(${esc(p.prazo)})</span>`:''}</li>`).join('') + `</ul>`;
  }
  h += `</div>`;
  return h;
}

  const v = x => (x==null?'':x);

    <div class="modal-hdr">
      <div><h2>${esc((g&&g.nome)||rmem.nome||code)}</h2><div class="sub">${has?'Editar números':'Lançar dados'} · ${esc(code)}</div></div>

      ${ef('e_htot','Horas totais',h.total)}
      ${ef('e_hfav','Faturáveis',h.faturaveis)}
      ${ef('e_hretr','Retrabalho',h.retrabalho)}
      ${ef('e_hch','Custo/hora (R$)',h.custoHora,true)}
    </div></div>
    <div class="sect"><h3>Comercial</h3><div class="eform">
      ${ef('e_leads','Leads',com.leads)}

async function saveEdits(code){
  const g = STATE[code]; const rmem = ROSTER.find(x=>x.code===code)||{};
  const has = !!(g && g.latest);
  const gv = id => { const e=document.getElementById(id); return e?e.value.trim():''; };
  const gvm = id => moneyParse(gv(id));
  const ref = gv('e_mes') || (new Date().toISOString().slice(0,7));
  const base = has ? JSON.parse(JSON.stringify(g.latest.data||{})) : {};
  base.financeiroMeses = base.financeiroMeses || {};
  base.financeiroMeses[ref] = Object.assign({}, base.financeiroMeses[ref]||{}, {
    faturamento:gvm('e_fat'), custoFixo:gvm('e_cf'), proLabore:gvm('e_pl'),
    margem:gv('e_margem'), caixa:gvm('e_caixa'), projetos:gv('e_proj'), obs:gv('e_fobs')
  });
  base.horas = Object.assign({}, base.horas||{}, { total:gv('e_htot'), faturaveis:gv('e_hfav'), retrabalho:gv('e_hretr'), custoHora:gvm('e_hch') });
  base.comercial = Object.assign({}, base.comercial||{}, { leads:gv('e_leads'), reunioes:gv('e_reun'), propostas:gv('e_prop'), fechados:gv('e_fech'), valorFechado:gvm('e_vf'), pipeline:gvm('e_pipe'), mrr:gvm('e_mrr'), canal:gv('e_canal') });
  base.concentracao = Object.assign({}, base.concentracao||{}, { maiorCliente:gv('e_maior'), top3:gv('e_top3') });
  const tEls = document.querySelectorAll('[data-tk]');
  if(tEls.length){ const arr=[]; tEls.forEach(el=>arr.push({prioridade:el.dataset.prio, desc:el.dataset.desc, status:el.value, obs:''})); base.tarefas = arr; }
  if(!base.financeiroMeses[ref].faturamento){ alert('Informe ao menos o faturamento do mês.'); return; }
  const btn = document.getElementById('saveEditBtn'); if(btn){ btn.disabled=true; btn.textContent='Salvando...'; }
  try{
    const s = await validToken(); if(!s) throw new Error('Sessão expirada');
    const headers = { "apikey":SUPABASE_ANON_KEY, "Authorization":"Bearer "+s.access_token, "Content-Type":"application/json", "Prefer":"return=minimal" };
    let r;
    if(has){
      r = await fetch(SUPABASE_URL+"/rest/v1/submissions?id=eq."+g.latest.id, { method:"PATCH", headers, body: JSON.stringify({ data:base, mes_ref:ref }) });
    } else {
      r = await fetch(SUPABASE_URL+"/rest/v1/submissions", { method:"POST", headers, body: JSON.stringify({ mentee_code:code, mentee_name:(g&&g.nome)||rmem.nome, mes_ref:ref, data:base }) });
    }
    if(!r.ok){ const t=await r.text(); throw new Error("Erro ao salvar ("+r.status+"): "+t.slice(0,140)); }
    await loadAndRender();
    closeModal();
    setTimeout(()=>openModal(code), 250);
  }catch(e){
    alert(e.message);
    if(btn){ btn.disabled=false; btn.textContent='Salvar alterações'; }
  }
}

// ===== FLOW =====
async function loadAndRender(){
  document.getElementById("dashBody").innerHTML = '<div class="loading">Carregando updates...</div>';
  try{
    const rows = await fetchSubmissions();
    const map = groupByMentee(rows);
    renderDashboard(map);
  }catch(e){
    if(String(e.message).includes("expirada")){ doLogout(); return; }
    document.getElementById("dashBody").innerHTML = '<div class="loading">Erro ao carregar: '+esc(e.message)+'</div>';
  }
}
function showDash(){ document.getElementById("loginScreen").classList.add("hidden"); document.getElementById("dashScreen").classList.remove("hidden"); loadAndRender(); }
function showLogin(){ document.getElementById("dashScreen").classList.add("hidden"); document.getElementById("loginScreen").classList.remove("hidden"); }
function doLogout(){ clearSession(); showLogin(); }

document.getElementById("loginBtn").addEventListener("click", async ()=>{
  const btn=document.getElementById("loginBtn"); const err=document.getElementById("loginErr");
  const email=document.getElementById("email").value.trim();
  const pwd=document.getElementById("password").value;
  if(!email||!pwd){ err.textContent="Preencha e-mail e senha."; err.classList.remove("hidden"); return; }
  err.classList.add("hidden"); btn.disabled=true; btn.textContent="Entrando...";
  try{ await login(email,pwd); showDash(); }
  catch(e){ err.textContent=e.message; err.classList.remove("hidden"); }
  finally{ btn.disabled=false; btn.textContent="Entrar"; }
});
document.getElementById("password").addEventListener("keydown",e=>{ if(e.key==="Enter") document.getElementById("loginBtn").click(); });
document.getElementById("refreshBtn").addEventListener("click", loadAndRender);
document.getElementById("logoutBtn").addEventListener("click", doLogout);

// auto-login se sessão válida
(async ()=>{ const s=await validToken(); if(s) showDash(); else showLogin(); })();
</script>
