<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Portal · Publi Advisor</title>
<meta http-equiv="refresh" content="0; url=./aluno.html">
<link rel="canonical" href="https://caiobocuti.github.io/portal-mentorado/aluno.html">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0B0B0C;--surface:#161617;--border:#2B2B2E;--text:#F4F4F5;--muted:#A1A1AA;--accent:#FF1E3D}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Cairo",-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;background:
    radial-gradient(1200px 600px at 80% -10%, #19090c 0%, transparent 60%), var(--bg);color:var(--text);
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:38px 34px;max-width:430px;
    text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.5)}
  .brand{font-size:12px;text-transform:uppercase;letter-spacing:.16em;color:var(--accent);font-weight:700}
  h1{font-size:22px;font-weight:900;margin:10px 0 8px}
  p{color:var(--muted);font-size:14.5px;line-height:1.6;margin-bottom:22px}
  a.btn{display:inline-block;background:var(--accent);color:#fff;text-decoration:none;font-weight:700;font-size:15px;
    padding:13px 24px;border-radius:9px}
  a.btn:hover{filter:brightness(1.08)}
</style>
</head>
<body>
  <div class="card">
    <div class="brand">Mentoria · Publi Advisor</div>
    <h1>O portal mudou de endereço</h1>
    <p>Agora é tudo no <strong>Portal do Aluno</strong> — você entra com o e-mail e a senha que seu mentor enviou e preenche seus dados por lá mesmo.</p>
    <a class="btn" href="./aluno.html">Ir para o Portal do Aluno</a>
  </div>
<script>setTimeout(function(){ location.replace("./aluno.html"); }, 1200);</script>
</body>
</html>
