<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Portal do Aluno · Publi Advisor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0B0B0C; --surface:#161617; --surface-alt:#1E1E20;
  --border:#2B2B2E; --border-strong:#3C3C40;
  --text:#F4F4F5; --text-muted:#A1A1AA; --text-faint:#71717A;
  --accent:#FF1E3D; --accent-soft:#2B0D12; --ink:#FF1E3D;
  --green:#4ADE80; --green-soft:#12251A;
  --amber:#FBBF24; --amber-soft:#2A220A; --blue:#5cc8ff;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:"Cairo",-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",Helvetica,Arial,sans-serif;
  background:var(--bg); color:var(--text); min-height:100vh; line-height:1.55; letter-spacing:.01em;
}
input{color:var(--text);font-family:inherit}
input::placeholder{color:var(--text-faint);opacity:1}
.hidden{display:none!important}
a{color:var(--accent)}

/* ===== LOGIN ===== */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
  background:radial-gradient(1200px 600px at 80% -10%, #19090c 0%, transparent 60%), var(--bg)}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;
  padding:36px 32px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.brand{font-size:12px;text-transform:uppercase;letter-spacing:.16em;color:var(--accent);font-weight:700}
.login-card h1{font-size:24px;font-weight:900;margin:8px 0 4px}
.login-card .sub{color:var(--text-muted);font-size:13.5px;margin-bottom:24px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-faint);font-weight:600;margin-bottom:6px}
.field input{width:100%;padding:12px 14px;background:var(--surface-alt);
  border:1px solid var(--border-strong);border-radius:8px;font-size:15px}
.field input:focus{outline:2px solid var(--ink);outline-offset:-1px;border-color:var(--ink)}
.btn-main{width:100%;padding:13px;margin-top:6px;background:var(--ink);color:#fff;border:none;
  border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-main:hover{filter:brightness(1.08)}
.btn-main:disabled{opacity:.5;cursor:default}
.login-err{background:var(--accent-soft);border:1px solid var(--accent);color:var(--accent);
  padding:10px 12px;border-radius:8px;font-size:13px;margin-bottom:14px}
.login-card .hint{margin-top:16px;font-size:12px;color:var(--text-muted);text-align:center;line-height:1.6}

/* ===== APP LAYOUT ===== */
.app-layout{display:flex;min-height:100vh}
.sidebar{width:252px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;position:sticky;top:0;height:100vh;padding:22px 14px 16px}
.side-brand{font-size:10.5px;text-transform:uppercase;letter-spacing:.16em;color:var(--accent);font-weight:700;padding:0 8px;margin-bottom:16px}
.side-prod{padding:0 8px 16px;border-bottom:1px solid var(--border);margin-bottom:12px}
.side-prod .nome{font-size:18px;font-weight:900;line-height:1.2}
.side-prod .empresa{font-size:11.5px;color:var(--text-muted);margin-top:4px;line-height:1.4}
.momento-badge{display:inline-block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;
  padding:3px 9px;border-radius:20px;background:var(--accent-soft);color:var(--accent);margin-top:10px}
.side-nav{display:flex;flex-direction:column;gap:3px;flex:1;overflow-y:auto}
.side-nav button{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:transparent;
  border:none;color:var(--text-muted);font-family:inherit;font-size:14px;font-weight:600;
  padding:11px 12px;border-radius:9px;cursor:pointer;transition:background .12s,color .12s}
.side-nav button .ic{width:18px;text-align:center;font-size:15px;opacity:.85}
.side-nav button:hover{background:var(--surface-alt);color:var(--text)}
.side-nav button.active{background:var(--accent-soft);color:var(--accent)}
.side-nav button.active .ic{opacity:1}
.side-foot{display:flex;flex-direction:column;gap:6px;padding-top:12px;border-top:1px solid var(--border);margin-top:8px}
.side-foot button{background:transparent;border:1px solid var(--border-strong);color:var(--text-muted);
  padding:9px 12px;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:600;text-align:left}
.side-foot button:hover{border-color:var(--accent);color:var(--text)}

.main{flex:1;min-width:0;padding:30px 36px 70px;max-width:960px}
.view-head{margin-bottom:22px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.view-head h1{font-size:24px;font-weight:900}
.view-head .vsub{font-size:13px;color:var(--text-muted);margin-top:3px}
.view{display:none}
.view.active{display:block}

/* ===== COMPONENTS ===== */
.resumo{font-size:15.5px;line-height:1.7;color:var(--text);background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:18px 20px}
.block-title{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);
  font-weight:700;margin:26px 0 14px}

.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px}
.kpi .k{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-faint);font-weight:600;margin-bottom:6px}
.kpi .v{font-size:25px;font-weight:900;line-height:1}
.kpi .v.accent{color:var(--accent)} .kpi .v.green{color:var(--green)} .kpi .v.amber{color:var(--amber)}
.kpi .d{font-size:11.5px;color:var(--text-muted);margin-top:5px}

.chart-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;height:330px}
.empty-fin{background:var(--surface);border:1px dashed var(--border-strong);border-radius:12px;
  padding:30px;text-align:center;color:var(--text-muted);font-size:14.5px;line-height:1.7}

.mat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 28px;background:var(--surface);
  border:1px solid var(--border);border-radius:12px;padding:20px}
.mat-row{display:flex;align-items:center;gap:12px}
.mat-row .lbl{width:120px;font-size:13px;color:var(--text-muted);flex-shrink:0}
.mat-bar{flex:1;height:9px;background:var(--surface-alt);border-radius:6px;overflow:hidden}
.mat-bar > span{display:block;height:100%}
.mat-bar > span.low{background:var(--accent)} .mat-bar > span.mid{background:var(--amber)} .mat-bar > span.hi{background:var(--green)}
.mat-row .num{width:26px;text-align:right;font-size:13px;font-weight:700}

.alav{display:flex;flex-direction:column;gap:14px}
.alav-card{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:0 12px 12px 0;padding:16px 18px}
.alav-card .t{font-size:16px;font-weight:800;margin-bottom:7px}
.alav-card .m{font-size:14px;color:var(--text-muted);line-height:1.65;margin-bottom:10px}
.alav-card .i{font-size:13px;font-weight:700;color:var(--green);background:var(--green-soft);
  display:inline-block;padding:6px 11px;border-radius:6px}

ul.clean{list-style:none;display:flex;flex-direction:column;gap:10px;background:var(--surface);
  border:1px solid var(--border);border-radius:12px;padding:18px 20px}
ul.clean li{font-size:14.5px;line-height:1.55;padding-left:20px;position:relative;color:var(--text)}
ul.clean li::before{content:"";position:absolute;left:2px;top:9px;width:7px;height:7px;border-radius:2px;background:var(--accent)}

.tlist{display:flex;flex-direction:column;gap:9px}
.titem{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:13px 15px;display:flex;align-items:flex-start;gap:12px}
.tstatus{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:3px 8px;border-radius:5px;white-space:nowrap;margin-top:1px}
.ts-concluida{background:var(--green-soft);color:var(--green)}
.ts-em_andamento{background:#0d1f2b;color:var(--blue)}
.ts-atrasada{background:var(--accent-soft);color:var(--accent)}
.ts-pendente{background:var(--surface-alt);color:var(--text-faint);border:1px solid var(--border)}
.ts-cancelada{background:var(--surface-alt);color:var(--text-faint);text-decoration:line-through}
.titem .td{font-size:14px;flex:1}
.titem .tp{font-size:10px;font-weight:700;color:var(--accent)}
.titem .tprz{font-size:11.5px;color:var(--text-faint);margin-top:4px}
.note{font-size:12.5px;color:var(--text-faint);margin-top:14px}

.comgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.mbox{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px}
.mbox .l{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-faint);font-weight:600}
.mbox .n{font-size:18px;font-weight:800;margin-top:4px}
.mbox .n.green{color:var(--green)} .mbox .n.accent{color:var(--accent)}

.direcao{font-size:15px;line-height:1.75;color:var(--text);background:var(--surface);
  border-radius:12px;padding:20px;border:1px solid var(--border);border-left:3px solid var(--accent)}
.materiais a.mat-link{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:14px 16px;text-decoration:none;color:var(--text);font-size:14.5px;font-weight:600;margin-bottom:9px}
.materiais a.mat-link:hover{border-color:var(--accent)}
.materiais .none{color:var(--text-faint);font-size:14px;background:var(--surface);border:1px dashed var(--border-strong);
  border-radius:12px;padding:24px;text-align:center;line-height:1.6}
.loading{text-align:center;padding:80px 0;color:var(--text-muted);font-size:14px}

/* KPI cards */
.kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.kpicard{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--border-strong);border-radius:12px;padding:16px 18px}
.kpicard.ok{border-left-color:var(--green)} .kpicard.warn{border-left-color:var(--amber)} .kpicard.bad{border-left-color:var(--accent)}
.kpicard .top{display:flex;justify-content:space-between;align-items:center;gap:10px}
.kpicard .name{font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em}
.farol{width:11px;height:11px;border-radius:50%;flex-shrink:0;background:var(--border-strong)}
.farol.ok{background:var(--green)} .farol.warn{background:var(--amber)} .farol.bad{background:var(--accent)}
.kpicard .val{font-size:30px;font-weight:900;margin:8px 0 2px;line-height:1}
.kpicard .val.ok{color:var(--green)} .kpicard .val.warn{color:var(--amber)} .kpicard .val.bad{color:var(--accent)}
.kpicard .bench{font-size:12px;color:var(--text-faint)}
.kpicard .coach{font-size:13px;color:var(--text);margin-top:11px;line-height:1.55;border-top:1px solid var(--border);padding-top:10px}
.kpicard .coach a{font-weight:600}

/* Evolution ladder */
.ladder{display:flex;flex-direction:column;gap:10px}
.stage{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 18px;display:flex;gap:14px;align-items:flex-start;opacity:.55}
.stage.current{opacity:1;border-color:var(--accent)}
.stage .nlevel{width:30px;height:30px;border-radius:8px;background:var(--surface-alt);display:flex;align-items:center;justify-content:center;font-weight:900;flex-shrink:0;font-size:14px}
.stage.current .nlevel{background:var(--accent);color:#fff}
.stage .sname{font-size:16px;font-weight:800}
.stage .sdesc{font-size:13.5px;color:var(--text-muted);margin-top:3px;line-height:1.55}
.stage .scur{display:inline-block;font-size:10.5px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.05em;margin-top:8px;background:var(--accent-soft);padding:3px 9px;border-radius:20px}
.next-box{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:0 12px 12px 0;padding:16px 18px;margin-top:18px;font-size:14.5px;line-height:1.7}

/* Lessons */
.lesson{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden}
.lesson summary{list-style:none;cursor:pointer;padding:15px 18px;display:flex;justify-content:space-between;align-items:center;gap:12px}
.lesson summary::-webkit-details-marker{display:none}
.lesson summary .lt{font-size:15.5px;font-weight:800}
.lesson summary .lr{font-size:13px;color:var(--text-muted);margin-top:3px;font-weight:400}
.lesson summary .chev{color:var(--accent);font-size:16px;flex-shrink:0;transition:transform .15s}
.lesson[open] summary .chev{transform:rotate(90deg)}
.lesson .lbody{padding:2px 18px 18px;font-size:14.5px;line-height:1.7;color:var(--text)}
.lesson .lbody h4{color:var(--accent);font-size:11.5px;text-transform:uppercase;letter-spacing:.05em;margin:14px 0 6px}
.lesson .lbody p{margin-bottom:8px}
.lesson .lbody ul{margin:0 0 8px 18px}

@media(max-width:820px){
  .app-layout{flex-direction:column}
  .kpi-grid{grid-template-columns:1fr}
  .sidebar{width:100%;height:auto;position:static;border-right:none;border-bottom:1px solid var(--border)}
  .side-nav{flex-direction:row;overflow-x:auto;gap:6px;padding-bottom:4px}
  .side-nav button{white-space:nowrap}
  .side-foot{flex-direction:row}
  .main{padding:22px 18px 60px}
  .kpis{grid-template-columns:1fr 1fr}.mat-grid{grid-template-columns:1fr}.comgrid{grid-template-columns:1fr 1fr}
}

/* ===== FORM (atualizar) ===== */
.form-sec{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px;margin-bottom:16px}
.form-sec h3{font-size:13px;text-transform:uppercase;letter-spacing:.06em;color:var(--accent);font-weight:700;margin-bottom:4px}
.form-sec .desc{font-size:12.5px;color:var(--text-muted);margin-bottom:14px}
.fgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px 14px}
.fgrid.two{grid-template-columns:repeat(2,1fr)}
.fld{display:flex;flex-direction:column;gap:5px}
.fld label{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--text-faint);font-weight:600}
.fld input,.fld select,.fld textarea{background:var(--surface-alt);border:1px solid var(--border-strong);border-radius:8px;
  padding:10px 12px;font-size:14px;color:var(--text);font-family:inherit;width:100%}
.fld input:focus,.fld select:focus,.fld textarea:focus{outline:2px solid var(--ink);outline-offset:-1px;border-color:var(--ink)}
.fld.full{grid-column:1/-1}
.fld textarea{min-height:58px;resize:vertical}
.tf-item{background:var(--surface-alt);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:9px}
.tf-item .tf-desc{font-size:14px;margin-bottom:9px;line-height:1.5}
.tf-item .tf-desc .tp{font-size:10px;font-weight:700;color:var(--accent);margin-right:6px}
.tf-row{display:grid;grid-template-columns:210px 1fr;gap:10px;align-items:start}
/* OKR */
.okr-top{margin-bottom:14px}
.okr-obj{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:14px}
.okr-obj-hd{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.okr-onum{flex-shrink:0;font-size:11px;font-weight:800;color:var(--accent);background:var(--accent-soft);border:1px solid var(--accent);border-radius:6px;padding:4px 8px;letter-spacing:.04em}
.okr-krhead{display:grid;grid-template-columns:1fr 110px 110px 130px 32px;gap:8px;font-size:9.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-faint);font-weight:600;margin-bottom:5px;padding:0 2px}
.okr-kr{display:grid;grid-template-columns:1fr 110px 110px 130px 32px;gap:8px;align-items:center;margin-bottom:8px}
.okr-kr input,.okr-otitle,#okr_periodo{width:100%;padding:9px 11px;background:var(--surface-alt);border:1px solid var(--border-strong);border-radius:8px;font-size:13.5px;color:var(--text);font-family:inherit}
.okr-kr input:focus,.okr-otitle:focus,#okr_periodo:focus{outline:2px solid var(--accent);outline-offset:-1px;border-color:var(--accent)}
.okr-otitle{flex:1;font-weight:700}
.kr-prog{display:flex;align-items:center;gap:6px}
.kr-bar{flex:1;height:7px;background:var(--surface-alt);border-radius:6px;overflow:hidden}
.kr-bar>span{display:block;height:100%;background:var(--green);transition:width .2s}
.kr-pct{font-size:11px;color:var(--text-muted);min-width:34px;text-align:right}
.okr-x{flex-shrink:0;width:30px;height:30px;border-radius:7px;background:transparent;border:1px solid var(--border-strong);color:var(--text-faint);font-size:16px;cursor:pointer;line-height:1}
.okr-x:hover{border-color:var(--accent);color:var(--accent)}
.okr-addkr,.okr-addobj{background:transparent;border:1px dashed var(--border-strong);color:var(--text-muted);border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.okr-addkr:hover,.okr-addobj:hover{border-color:var(--accent);color:var(--text)}
.okr-addobj{margin-bottom:16px}
#okrSaveBtn{background:var(--accent);color:#fff;border:none;border-radius:9px;padding:12px 22px;font-size:14.5px;font-weight:700;cursor:pointer;font-family:inherit}
#okrSaveBtn:hover{filter:brightness(1.08)} #okrSaveBtn:disabled{opacity:.5;cursor:default}
@media(max-width:680px){.okr-krhead{display:none}.okr-kr{grid-template-columns:1fr 1fr 32px}.okr-kr .kr-prog{grid-column:1/-1}}
#mentorBar{background:var(--accent);color:#fff;font-size:13px;font-weight:600;padding:9px 16px;text-align:center}
#mentorBar a{color:#fff;text-decoration:underline;margin-left:8px;font-weight:700}
#mentorBar b{font-weight:800}
.save-bar{position:sticky;bottom:0;background:linear-gradient(transparent,var(--bg) 32%);padding:18px 0 6px;display:flex;align-items:center;gap:14px;margin-top:6px}
.save-bar button{background:var(--ink);color:#fff;border:none;border-radius:9px;padding:13px 28px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.save-bar button:hover{filter:brightness(1.08)} .save-bar button:disabled{opacity:.5;cursor:default}
.save-msg{font-size:13px}.save-msg.ok{color:var(--green)}.save-msg.err{color:var(--accent)}
.histtable{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:12px}
.histtable th,.histtable td{border:1px solid var(--border);padding:6px 9px;text-align:right}
.histtable th:first-child,.histtable td:first-child{text-align:left}
.histtable th{color:var(--text-faint);font-weight:600;text-transform:uppercase;font-size:10px;letter-spacing:.04em}

/* dashboard (visao) */
.dash-tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.full-chart{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px}
.full-chart .mct{font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
.cnv-lg{height:300px}
.minicharts{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}
.mc{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px}
.mc .mct{font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
.mc .cnv{height:175px}

/* diagnóstico de redes (topo da visão) */
.diag{background:linear-gradient(180deg, rgba(255,30,61,.06), transparent 55%), var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:12px;padding:18px 20px;margin-bottom:18px}
.diag-h{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--accent)}
.diag-ig{color:var(--text-faint);font-weight:600;text-transform:none;letter-spacing:0;margin-left:8px}
.diag-sub{font-size:12px;color:var(--text-faint);margin-top:3px}
.diag-sec{margin-top:15px}
.diag-t{font-size:11.5px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.diag-sec p{font-size:13.5px;line-height:1.62;color:var(--text);margin:0 0 8px}
.diag-sec ul{margin:0;padding-left:18px}
.diag-sec li{font-size:13.5px;line-height:1.55;color:var(--text);margin-bottom:6px}

// ===== HELPERS =====
function fmtBRL(v){ if(v===""||v==null) return "—"; const n=parseFloat(v); if(isNaN(n)) return "—";
  if(Math.abs(n)>=1000) return "R$ "+(n/1000).toLocaleString("pt-BR",{maximumFractionDigits:1})+"k";
  return "R$ "+n.toLocaleString("pt-BR",{maximumFractionDigits:0}); }
function fmtPct(v){ if(v===""||v==null) return "—"; const n=parseFloat(v); if(isNaN(n)) return "—"; return n+"%"; }
function mesLabel(k){ if(!k) return "—"; const [y,m]=k.split("-"); return (MESES[parseInt(m,10)-1]||"?")+"/"+y; }
function esc(s){ return (s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c])); }
function fillClass(v){ return v<=3?"low":v<=6?"mid":"hi"; }

// ===== AUTH =====
function getSession(){ try{ return JSON.parse(localStorage.getItem(SESSION_KEY)||"null"); }catch(e){ return null; } }
function setSession(s){ localStorage.setItem(SESSION_KEY, JSON.stringify(s)); }
function clearSession(){ localStorage.removeItem(SESSION_KEY); }

async function login(email, password){
  const r = await fetch(SUPABASE_URL+"/auth/v1/token?grant_type=password", {
    method:"POST", headers:{ "apikey":SUPABASE_ANON_KEY, "Content-Type":"application/json" },
    body: JSON.stringify({ email, password })
  });
  const j = await r.json();
  if(!r.ok){ throw new Error(j.error_description || j.msg || j.error || ("Falha no login ("+r.status+")")); }
  const am = (j.user && j.user.app_metadata) || {};
  if(!am.code){ throw new Error("Conta sem produtora vinculada. Fale com seu mentor."); }
  const sess = { access_token:j.access_token, refresh_token:j.refresh_token,
    expires_at: Date.now()+(j.expires_in||3600)*1000, email, code: am.code, content: am.content||null };
  setSession(sess); return sess;
}
async function refreshSession(){
  const s=getSession(); if(!s||!s.refresh_token) return null;
  const r = await fetch(SUPABASE_URL+"/auth/v1/token?grant_type=refresh_token", {
    method:"POST", headers:{ "apikey":SUPABASE_ANON_KEY, "Content-Type":"application/json" },
    body: JSON.stringify({ refresh_token:s.refresh_token })
  });
  if(!r.ok){ clearSession(); return null; }
  const j = await r.json();
  const am = (j.user && j.user.app_metadata) || {};
  const sess = { access_token:j.access_token, refresh_token:j.refresh_token,
    expires_at: Date.now()+(j.expires_in||3600)*1000, email:s.email, code: am.code||s.code, content: am.content||s.content };
  setSession(sess); return sess;
}
async function validToken(){ let s=getSession(); if(!s) return null;
  if(Date.now() > s.expires_at - 60000){ s = await refreshSession(); } return s; }

// ===== MODO MENTOR (abrir o portal de uma produtora pelo acesso do mentor) =====
const AS_CODE = (function(){ try{ return new URLSearchParams(location.search).get("as"); }catch(e){ return null; } })();
const MENTOR_EMAIL = "caiobocuti@catalunyafilmes.com";
function mentorSession(){ try{ const m=JSON.parse(localStorage.getItem("mentor-session")||"null"); if(m && m.email===MENTOR_EMAIL && m.access_token) return m; }catch(e){} return null; }
function isMentorMode(){ return !!(AS_CODE && mentorSession()); }
async function mentorRefresh(m){
  try{
    const r = await fetch(SUPABASE_URL+"/auth/v1/token?grant_type=refresh_token", {
      method:"POST", headers:{ "apikey":SUPABASE_ANON_KEY, "Content-Type":"application/json" },
      body: JSON.stringify({ refresh_token:m.refresh_token }) });
    if(!r.ok) return null;
    const j = await r.json();
    const sess = { email:m.email, access_token:j.access_token, refresh_token:j.refresh_token||m.refresh_token, expires_at: Date.now()+(j.expires_in||3600)*1000 };
    try{ localStorage.setItem("mentor-session", JSON.stringify(sess)); }catch(e){}
    return sess;
  }catch(e){ return null; }
}
async function mentorValidToken(){
  let m = mentorSession(); if(!m) return null;
  if(Date.now() > (m.expires_at||0) - 60000){ m = m.refresh_token ? await mentorRefresh(m) : null; }
  return m;
}

// ===== DATA =====
async function fetchMenteeContent(code, token){
  try{
    const r = await fetch(SUPABASE_URL+"/rest/v1/mentee_content?code=eq."+encodeURIComponent(code)+"&select=content", {
      headers:{ "apikey":SUPABASE_ANON_KEY, "Authorization":"Bearer "+token } });
    if(!r.ok) return null;
    const j = await r.json();
    return (j && j[0] && j[0].content) ? j[0].content : null;
  }catch(e){ return null; }
}
async function fetchSubmissions(code, token){
  if(!token){ const s = await validToken(); if(!s) throw new Error("expirada"); token = s.access_token; }
  const r = await fetch(SUPABASE_URL+"/rest/v1/submissions?mentee_code=eq."+encodeURIComponent(code)+"&select=*&order=created_at.desc", {
    headers:{ "apikey":SUPABASE_ANON_KEY, "Authorization":"Bearer "+token }
  });
  if(r.status===401){ if(isMentorMode()) throw new Error("expirada-mentor"); const ns=await refreshSession(); if(!ns) throw new Error("expirada"); return fetchSubmissions(code); }
  if(!r.ok) throw new Error("Erro ao buscar dados ("+r.status+")");
  return r.json();
}
function mergeFin(subs){ const fm={};
  [...subs].reverse().forEach(sub=>{ const f=(sub.data&&sub.data.financeiroMeses)||{};
    Object.keys(f).forEach(k=>{ fm[k]=f[k]; }); }); return fm; }

// ===== MATURIDADE (cálculo 100% automático a partir dos dados preenchidos) =====
function num(v){ const n=parseFloat(v); return isNaN(n)?null:n; }
function avgNN(arr){ const a=arr.filter(x=>x!=null&&!isNaN(x)); return a.length? a.reduce((s,x)=>s+x,0)/a.length : null; }
function brk(v, breaks){ if(v==null) return null; for(const [t,s] of breaks){ if(v>=t) return s; } return breaks[breaks.length-1][1]; }
function currentYM(){ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0"); }

// snapshot de maturidade de UMA submissão
function maturitySnapshot(content, sub){
  const d=(sub&&sub.data)||{};
  const fmeses=d.financeiroMeses||{};
  const months=Object.keys(fmeses).filter(k=> num(fmeses[k]&&fmeses[k].faturamento)>0).sort();
  const finRef=months.length? fmeses[months[months.length-1]] : {};
  const meta=num(content.metaFaturamentoMensal);
  const margem=num(finRef.margem), fat=num(finRef.faturamento), cf=num(finRef.custoFixo), pl=num(finRef.proLabore), proj=num(finRef.projetos);
  const h=d.horas||{}, c=d.comercial||{}, conc=d.concentracao||{};
  const tot=num(h.total), fav=num(h.faturaveis), retr=num(h.retrabalho);
  const ocup=(tot&&fav!=null&&tot>0)? fav/tot*100 : null;
  const retraPct=(tot&&retr!=null&&tot>0)? retr/tot*100 : null;
  const prop=num(c.propostas), fech=num(c.fechados), vf=num(c.valorFechado), mrr=num(c.mrr);
  const pipe=(num(c.pipeline)!=null)? num(c.pipeline) : num((content.comercial||{}).pipelineValor);
  const conv=(prop&&fech!=null&&prop>0)? fech/prop*100 : null;
  const cov=(pipe!=null&&meta&&meta>0)? pipe/meta : null;
  const mrrShare=(mrr!=null&&fat&&fat>0)? mrr/fat*100 : null;
  let ticket=null; if(vf!=null&&fech&&fech>0) ticket=vf/fech; else if(fat!=null&&proj&&proj>0) ticket=fat/proj;
  const concV=num(conc.maiorCliente);
  const tarefas=d.tarefas||[];
  let planoPct=null; if(tarefas.length){ const done=tarefas.filter(t=>t.status==="concluida").length; planoPct=done/tarefas.length*100; }
  const prospStr=(c.prospec||"").toString().toLowerCase();
  const prospAtiva = prospStr? !/(nao|não|inativ|parad|nenhum|sem )/.test(prospStr) : null;

  const margemS=brk(margem,[[30,10],[25,9],[20,7],[15,5],[10,3],[0,1]]);
  const recorrS=(mrr==null)?null:((cf!=null&&pl!=null&&mrr>=cf+pl)?10:(cf!=null&&mrr>=cf)?6:(mrr>0?3:1));
  const atingS=(fat!=null&&meta&&meta>0)? brk(fat/meta*100,[[100,10],[80,8],[60,6],[40,4],[0,2]]) : null;
  const convS=brk(conv,[[30,10],[20,8],[10,5],[0.01,3],[0,1]]);
  const covS=brk(cov,[[3,10],[2,8],[1.5,6],[1,4],[0,2]]);
  const prospS=(prospAtiva==null)?null:(prospAtiva?9:5);
  const ocupS=(ocup==null)?null:((ocup>=60&&ocup<=78)?10:((ocup>=50&&ocup<60)||(ocup>78&&ocup<=85))?7:((ocup>=40&&ocup<50)||(ocup>85&&ocup<=92))?5:3);
  const retraS=(retraPct==null)?null:(retraPct<=10?10:retraPct<=15?8:retraPct<=20?6:retraPct<=25?4:2);
  const concS=(concV==null)?null:(concV<20?10:concV<30?8:concV<40?6:concV<=50?4:2);
  const mrrShareS=brk(mrrShare,[[40,10],[25,8],[15,6],[5,4],[0,2]]);
  const ticketS=brk(ticket,[[40000,10],[25000,8],[15000,6],[8000,4],[0,3]]);
  const planoS=(planoPct==null)?null:Math.max(1,Math.round(planoPct/10));
  const finFilled=months.length>0, horasFilled=(tot!=null&&tot>0), comFilled=(prop!=null||pipe!=null||mrr!=null);
  const blocks=(finFilled?1:0)+(horasFilled?1:0)+(comFilled?1:0);
  const trackingS=blocks? Math.round(blocks/3*10) : null;
  const headroomS=(ocup==null)?null:(ocup<70?9:ocup<=85?6:3);

  const dims={
    financeiro: avgNN([margemS,recorrS,atingS]),
    comercial: avgNN([convS,covS,prospS]),
    operacao: avgNN([ocupS,retraS]),
    escalabilidade: avgNN([concS,mrrShareS,headroomS]),
    posicionamento: avgNN([ticketS,margemS]),
    gestao: avgNN([planoS,trackingS,retraS]),
    lideranca: avgNN([planoS,headroomS,prospS])
  };
  const base=content.maturidade||{};
  const out={}; let calcCount=0, sum=0, n=0;
  Object.keys(MAT_LBL).forEach(k=>{
    let v=dims[k]; const calc=(v!=null);
    if(v==null) v=(base[k]!=null? base[k] : null);
    if(v!=null){ v=Math.max(0,Math.min(10,Math.round(v))); sum+=v; n++; if(calc) calcCount++; }
    out[k]={val:v, calc};
  });
  return { dims:out, overall:(n? sum/n : null), hasData:(calcCount>0) };
}
function maturityCurrent(content, subs){ return maturitySnapshot(content, (subs&&subs[0])||null); }
function stageFromScore(o){ if(o==null) return null; if(o<3) return "sobrevivencia"; if(o<4.5) return "estruturacao"; if(o<6.5) return "crescimento"; return "escala"; }

// séries temporais (compilação de todas as submissões)
function buildSeries(content, subs){
  const cs=[...subs].slice().reverse(); // mais antigo -> mais novo
  const labels=cs.map(s=> s.mes_ref? mesLabel(s.mes_ref) : (s.created_at? new Date(s.created_at).toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit"}):"—"));
  const lastFin=d=>{ const f=(d&&d.financeiroMeses)||{}; const ms=Object.keys(f).filter(k=>num(f[k]&&f[k].faturamento)>0).sort(); return ms.length? f[ms[ms.length-1]] : {}; };
  const margem=cs.map(s=>num(lastFin(s.data).margem));
  const ocup=cs.map(s=>{ const h=(s.data&&s.data.horas)||{}; const t=num(h.total),f=num(h.faturaveis); return (t&&f!=null&&t>0)?Math.round(f/t*100):null; });
  const conv=cs.map(s=>{ const c=(s.data&&s.data.comercial)||{}; const p=num(c.propostas),f=num(c.fechados); return (p&&f!=null&&p>0)?Math.round(f/p*100):null; });
  const mrr=cs.map(s=>{ const c=(s.data&&s.data.comercial)||{}; return num(c.mrr); });
  const matOverall=cs.map(s=>{ const m=maturitySnapshot(content,s); return m.overall!=null? Math.round(m.overall*10)/10 : null; });
  const fm=mergeFin(subs); const mk=Object.keys(fm).filter(k=>num(fm[k]&&fm[k].faturamento)>0).sort();
  return { labels, margem, ocup, conv, mrr, matOverall, months:mk.map(mesLabel), fatByMonth:mk.map(k=>num(fm[k].faturamento)||0), meta:num(content.metaFaturamentoMensal) };
}

function moneyMask(s){
  s = String(s==null?"":s).replace(/[^\d,]/g,"");
  const i = s.indexOf(",");
  if(i!==-1) s = s.slice(0,i+1) + s.slice(i+1).replace(/,/g,"");
  if(s==="") return "";
  let parts = s.split(","); let ip = parts[0], dp = parts[1];
  ip = (ip||"").replace(/^0+(?=\d)/,"");
  if(ip==="" && dp===undefined) return "";
  if(ip==="") ip = "0";
  ip = ip.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
  let out = "R$ " + ip;
  if(dp!==undefined) out += "," + dp.slice(0,2);
  return out;
}
function moneyParse(s){
  s = String(s==null?"":s).replace(/[^\d,]/g,"").replace(",", ".");
  if(s==="") return "";
  const n = parseFloat(s);
  return isNaN(n) ? "" : n;
}
function moneyInit(v){
  if(v==null || v==="") return "";
  const n = parseFloat(v); if(isNaN(n)) return "";
  return "R$ " + n.toLocaleString("pt-BR", {maximumFractionDigits:2});
}

    const margemUlt = (finUlt && finUlt.margem) ? finUlt.margem : null;
    visao = diagHTML + `<div class="dash-tiles">
      <div class="kpi"><div class="k">Faturamento (último mês)</div><div class="v accent">${ultimoFat!=null?fmtBRL(ultimoFat):'—'}</div><div class="d">${meses.length?mesLabel(meses[meses.length-1]):'—'}</div></div>
      <div class="kpi"><div class="k">Atingimento da meta</div><div class="v ${ating!=null?(ating>=100?'green':(ating>=70?'amber':'accent')):''}">${ating!=null?ating+'%':'—'}</div><div class="d">meta ${meta?fmtBRL(meta):'—'}</div></div>
      <div class="kpi"><div class="k">Margem (último mês)</div><div class="v ${margemUlt!=null?(margemUlt>=25?'green':(margemUlt>=15?'amber':'accent')):''}">${margemUlt!=null?margemUlt+'%':'—'}</div><div class="d">lucro sobre a receita</div></div>
      <div class="kpi"><div class="k">Maturidade geral</div><div class="v ${matScore!=null?(matScore>=6.5?'green':(matScore>=4?'amber':'accent')):''}">${matScore!=null?matScore:'—'}<span style="font-size:14px;font-weight:700">/10</span></div><div class="d">média das 7 dimensões</div></div>
    </div>
    <div class="full-chart" style="margin-top:14px"><div class="mct">Faturamento mensal vs. meta</div><div class="cnv-lg"><canvas id="vFat"></canvas></div></div>
    <div class="minicharts">
      <div class="mc"><div class="mct">Margem (%) ao longo do tempo</div><div class="cnv"><canvas id="vMargem"></canvas></div></div>
      <div class="mc"><div class="mct">Ocupação produtiva (%)</div><div class="cnv"><canvas id="vOcup"></canvas></div></div>
      <div class="mc"><div class="mct">Conversão comercial (%)</div><div class="cnv"><canvas id="vConv"></canvas></div></div>
      <div class="mc"><div class="mct">Receita recorrente · MRR</div><div class="cnv"><canvas id="vMrr"></canvas></div></div>
    </div>
    <div class="block-title">Resumo</div><div class="resumo">${esc(content.resumo||"")}</div>`;
  }

  // METAS
  let metas;
  if(meses.length){
    metas = `<div class="chart-wrap"><canvas id="finChart"></canvas></div>
      <div class="note">Linha verde tracejada = sua meta mensal. Barras = faturamento que você preencheu em Atualizar meus dados.</div>`;
  } else {
    metas = `<div class="empty-fin">Você ainda não enviou nenhum update.<br>
      Preencha seu primeiro mês em <a href="#" data-goto="atualizar">Atualizar meus dados</a> e clique em "Salvar atualização" — seu faturamento vs. meta aparece aqui automaticamente.</div>`;
  }
  _okr = normalizeOkr( (subs[0] && subs[0].data && subs[0].data.okr) || null );
  metas += okrSectionHTML();

  // ALAVANCAS
  let alav = (content.alavancas&&content.alavancas.length)
    ? '<div class="alav">'+content.alavancas.map(a=>`<div class="alav-card"><div class="t">${esc(a.titulo)}</div><div class="m">${esc(a.mecanismo)}</div><div class="i">${esc(a.impacto)}</div></div>`).join('')+'</div>'
    : '<div class="materiais"><div class="none">Nenhuma alavanca cadastrada.</div></div>';

  // COMERCIAL
  const com = content.comercial||{};
  let comercial = `<div class="comgrid">
    <div class="mbox"><div class="l">Pipeline aberto</div><div class="n accent">${fmtBRL(com.pipelineValor)}</div></div>
    <div class="mbox"><div class="l">Prospecção ativa</div><div class="n ${com.prospeccaoAtiva?'green':''}">${com.prospeccaoAtiva?'Sim':'Ainda não'}</div></div>
    <div class="mbox"><div class="l">Canal principal</div><div class="n" style="font-size:13.5px">${esc(com.canalPrincipal||'—')}</div></div>
  </div>`;
  if(content.oportunidades&&content.oportunidades.length){
    comercial += `<div class="block-title">Oportunidades</div><ul class="clean">`+content.oportunidades.map(o=>`<li>${esc(o)}</li>`).join('')+`</ul>`;
  }

  // PLANO (usa o status enviado pelo aluno quando houver)
  const subT = (subs[0] && subs[0].data && subs[0].data.tarefas) || [];
  const planoSrc = subT.length
    ? subT.map(t=>({prioridade:t.prioridade, descricao:t.desc, status:t.status, prazo:"", obs:t.obs}))
    : (content.plano||[]);
  let plano;
  if(planoSrc.length){
    const order={atrasada:0,em_andamento:1,pendente:2,concluida:3,cancelada:4}, po={maxima:0,alta:1,media:2};
    const sorted=[...planoSrc].sort((a,b)=> (po[a.prioridade]??1)-(po[b.prioridade]??1) || (order[a.status]??2)-(order[b.status]??2));
    plano = '<div class="tlist">'+sorted.map(t=>`<div class="titem"><span class="tstatus ts-${t.status||'pendente'}">${STATUS_LBL[t.status]||"A fazer"}</span><div class="td"><span class="tp">[${PRIO_LBL[t.prioridade]||'ALTA'}]</span> ${esc(t.descricao)}${t.prazo?`<div class="tprz">Prazo: ${esc(t.prazo)}</div>`:''}${t.obs?`<div class="tprz">${esc(t.obs)}</div>`:''}</div></div>`).join('')+'</div>'
      + `<div class="note">Atualize o status de cada tarefa em <a href="#" data-goto="atualizar">Atualizar meus dados</a>.</div>`;
  } else { plano = '<div class="materiais"><div class="none">Nenhuma tarefa no plano.</div></div>'; }

  // DIREÇÃO
  let direcao = content.direcao ? `<div class="direcao">${esc(content.direcao)}</div>` : '<div class="materiais"><div class="none">Sem direção estratégica registrada.</div></div>';

  // MATERIAIS
  let materiais = (content.materiais&&content.materiais.length)
    ? '<div class="materiais">'+content.materiais.map(m=>`<a class="mat-link" href="${esc(m.url)}" target="_blank">📄 ${esc(m.titulo)}</a>`).join('')+'</div>'
    : '<div class="materiais"><div class="none">Seu mentor ainda não anexou documentos aqui.<br>Em breve: rate card, deck institucional e materiais da sua produtora.</div></div>';

  // ===== KPIs (núcleo essencial, com farol e leitura) =====
  const sub0 = subs[0] || null;
  const d0 = sub0 ? (sub0.data||{}) : {};
  const refKey = (sub0 && sub0.mes_ref && fm[sub0.mes_ref] && parseFloat(fm[sub0.mes_ref].faturamento)>0) ? sub0.mes_ref : (meses.length?meses[meses.length-1]:null);
  const finRef = refKey ? (fm[refKey]||{}) : {};
  const horas = d0.horas||{}, comL = d0.comercial||{}, conc = d0.concentracao||{};
  function num(v){ const n=parseFloat(v); return isNaN(n)?null:n; }
  function card(name, val, status, bench, coach){
    return `<div class="kpicard ${status}"><div class="top"><div class="name">${name}</div><div class="farol ${status}"></div></div>
      <div class="val ${status}">${val}</div><div class="bench">${bench}</div><div class="coach">${coach}</div></div>`;
  }
  const cards = [];
  // Margem
  (()=>{ const m=num(finRef.margem);
    if(m==null) return cards.push(card("Margem líquida","—","na","Saudável: 25–35%","Preencha a margem em Atualizar meus dados para ver este indicador."));
    const st = m>=25?"ok":(m>=15?"warn":"bad");
    const co = st==="ok"?"Margem saudável. Proteja-a ao crescer — volume sem margem destrói lucro.":(st==="warn"?'Está na zona de atenção. Reveja preço e custo por job. <a href="#" data-goto="aprendizado">Ver aula de margem</a>.':'Abaixo do saudável — você pode estar vendendo perto do custo. <a href="#" data-goto="aprendizado">Veja como precificar por valor</a>.');
    cards.push(card("Margem líquida", m+"%", st, "Saudável: 25–35%", co)); })();
  // Ocupação
  (()=>{ const t=num(horas.total), f=num(horas.faturaveis);
    if(t==null||f==null||t<=0) return cards.push(card("Ocupação produtiva","—","na","Ideal: 60–75%","Preencha horas totais e faturáveis em Atualizar meus dados."));
    const o=Math.round(f/t*100); const st = (o>=60&&o<=82)?"ok":((o>=50&&o<60)||(o>82&&o<=90)?"warn":"bad");
    const co = o>82?"Ocupação alta demais — risco de exaustão do time. Vale contratar ou subir preço.":(o<50?"Muita capacidade ociosa ou retrabalho. Olhe o que consome as horas não faturáveis.":(st==="warn"?"Quase lá. Reduza retrabalho e tempo não faturável.":"Faixa saudável: o time produz sem se esgotar."));
    cards.push(card("Ocupação produtiva", o+"%", st, "Ideal: 60–75%", co)); })();
  // Retrabalho
  (()=>{ const t=num(horas.total), r=num(horas.retrabalho);
    if(t==null||r==null||t<=0) return cards.push(card("Retrabalho","—","na","Alvo: abaixo de 15%","Preencha horas de retrabalho em Atualizar meus dados."));
    const rw=Math.round(r/t*100); const st = rw<=15?"ok":(rw<=25?"warn":"bad");
    const co = st==="ok"?"Retrabalho sob controle.":(st==="warn"?"Retrabalho começando a comer margem — reforce briefing e aprovações.":'Retrabalho alto: processo/briefing precisa de gates. <a href="#" data-goto="aprendizado">Ver aula de delegação/processo</a>.');
    cards.push(card("Retrabalho", rw+"%", st, "Alvo: abaixo de 15%", co)); })();
  // Conversão
  (()=>{ const p=num(comL.propostas), fc=num(comL.fechados);
    if(p==null||fc==null||p<=0) return cards.push(card("Conversão comercial","—","na","Saudável: 20–35%","Preencha propostas enviadas e fechadas em Atualizar meus dados."));
    const c=Math.round(fc/p*100); const st = c>=20?"ok":(c>=10?"warn":"bad");
    const co = st==="ok"?"Boa conversão — seu discurso e proposta estão funcionando.":(st==="warn"?"Conversão mediana. Teste diagnóstico antes da proposta e follow-up estruturado.":"Conversão baixa: pode ser ICP errado ou proposta sem método. Reveja a qualificação.");
    cards.push(card("Conversão comercial", c+"%", st, "Saudável: 20–35%", co)); })();
  // Cobertura de pipeline
  (()=>{ const pipe=num(comL.pipeline)!=null?num(comL.pipeline):num((content.comercial||{}).pipelineValor); const meta2=num(content.metaFaturamentoMensal);
    if(pipe==null||meta2==null||meta2<=0) return cards.push(card("Cobertura de pipeline","—","na","Ideal: ~3x a meta","Preencha o pipeline aberto em Atualizar meus dados."));
    const cov=pipe/meta2; const st = cov>=3?"ok":(cov>=1.5?"warn":"bad");
    const co = st==="ok"?"Pipeline saudável para bater a meta.":(st==="warn"?"Pipeline apertado — alimente a prospecção para não faltar mês que vem.":'Pipeline insuficiente: ative prospecção já. <a href="#" data-goto="aprendizado">Ver aula de prospecção</a>.');
    cards.push(card("Cobertura de pipeline", cov.toFixed(1)+"x", st, "Ideal: ~3x a meta", co)); })();
  // Ticket médio
  (()=>{ let tk=null; const vf=num(comL.valorFechado), fc=num(comL.fechados);
    if(vf!=null&&fc!=null&&fc>0) tk=vf/fc; else { const ft=num(finRef.faturamento), pj=num(finRef.projetos); if(ft!=null&&pj!=null&&pj>0) tk=ft/pj; }
    if(tk==null) return cards.push(card("Ticket médio","—","na","Quanto maior, menos volume","Preencha valor e nº de projetos fechados no portal."));
    cards.push(card("Ticket médio", fmtBRL(tk), "na", "Alavanca: subir ticket > buscar volume", 'Subir o ticket é a forma mais leve de crescer. <a href="#" data-goto="aprendizado">Ver aula de posicionamento</a>.')); })();
  // Recorrência (MRR vs piso)
  (()=>{ const mrr=num(comL.mrr), cf=num(finRef.custoFixo), pl=num(finRef.proLabore), ft=num(finRef.faturamento);
    if(mrr==null) return cards.push(card("Receita recorrente","—","na","Ideal: cobrir custo fixo + pró-labore","Preencha a receita recorrente (MRR) em Atualizar meus dados."));
    const piso = (cf!=null&&pl!=null)?cf+pl:(cf!=null?cf:null);
    let st="warn", co="Recorrência crescendo — meta: cobrir a conta fixa da empresa.";
    if(piso!=null){ if(mrr>=piso){ st="ok"; co="Sua recorrência já paga custo fixo + pró-labore. Esse é o piso que dá liberdade pra vender melhor."; }
      else if(cf!=null&&mrr>=cf){ st="warn"; co="Já cobre o custo fixo; falta cobrir o pró-labore. Mais 1-2 contratos recorrentes destravam isso."; }
      else { st="bad"; co='Recorrência ainda não cobre a conta fixa — você vende no susto. <a href="#" data-goto="aprendizado">Ver aula de recorrência</a>.'; } }
    const pctR = (ft!=null&&ft>0)?" · "+Math.round(mrr/ft*100)+"% da receita":"";
    cards.push(card("Receita recorrente", fmtBRL(mrr), st, "Ideal: cobrir custo fixo + pró-labore"+pctR, co)); })();
  // Concentração
  (()=>{ const mc=num(conc.maiorCliente);
    if(mc==null) return cards.push(card("Concentração de clientes","—","na","Risco se >30% num só cliente","Preencha o % do maior cliente em Atualizar meus dados."));
    const st = mc<30?"ok":(mc<=50?"warn":"bad");
    const co = st==="ok"?"Receita bem distribuída — perder um cliente não derruba o ano.":(st==="warn"?"Atenção: um cliente pesa bastante. Diversifique com recorrência e prospecção.":'Risco alto: depende demais de um cliente. <a href="#" data-goto="aprendizado">Ver aula de concentração</a>.');
    cards.push(card("Concentração (maior cliente)", mc+"%", st, "Risco se >30% num só cliente", co)); })();

  const kpis = `<div class="kpi-grid">${cards.join("")}</div>
    <div class="note">Os faróis comparam seus números com benchmarks de produtoras saudáveis. Atualize seus números em <a href="#" data-goto="atualizar">Atualizar meus dados</a> para mantê-los vivos.</div>`;

  // ===== EVOLUÇÃO (maturidade calculada) =====
  const dimsK = Object.keys(MAT_LBL);
  const matRows = dimsK.map(k=>{ const o=_mat.dims[k]; const v=o.val;
    return `<div class="mat-row"><div class="lbl">${MAT_LBL[k]}</div><div class="mat-bar"><span class="${v==null?'':fillClass(v)}" style="width:${v==null?0:v*10}%"></span></div><div class="num">${v==null?'—':v}</div></div>`; }).join('');
  let evolucao = `<div class="radar-wrap"><canvas id="evRadar"></canvas></div>
    <div class="mat-note">${_mat.hasData
      ? 'Calculado a partir dos seus números mais recentes. As dimensões que você ainda não alimentou usam o diagnóstico inicial do mentor como ponto de partida.'
      : 'Ainda sem dados preenchidos — mostrando o diagnóstico inicial do seu mentor. Atualize seus dados em "Atualizar meus dados" para o cálculo passar a refletir a realidade.'}</div>
    <div class="block-title">Maturidade por dimensão (0-10)</div><div class="mat-grid">${matRows}</div>`;
  if(_series && _series.matOverall.filter(x=>x!=null).length>1){
    evolucao += `<div class="block-title">Evolução da maturidade geral</div><div class="mc"><div class="cnv" style="height:200px"><canvas id="evLine"></canvas></div></div>`;
  }
  evolucao += `<div class="block-title">Em que estágio você está</div><div class="ladder">` + STAGES.map((s,i)=>
    `<div class="stage ${s.id===_matStage?'current':''}"><div class="nlevel">${i+1}</div>
      <div><div class="sname">${s.nome}${s.id===_matStage?' <span class="scur">Você está aqui</span>':''}</div>
      <div class="sdesc">${esc(s.desc)}</div></div></div>`).join('') + '</div>';
  if(content.direcao) evolucao += `<div class="block-title">Como subir de nível</div><div class="next-box">${esc(content.direcao)}</div>`;

  // ===== APRENDIZADO =====
  const trilha = content.trilha || [];
  let aprendizado = trilha.length
    ? trilha.map(id=>{ const L=LESSON_LIBRARY[id]; if(!L) return '';
        return `<details class="lesson"><summary><div><div class="lt">${esc(L.titulo)}</div><div class="lr">${esc(L.resumo)}</div></div><span class="chev">▸</span></summary><div class="lbody">${L.corpo}</div></details>`; }).join('')
    : '<div class="materiais"><div class="none">Sua trilha de aprendizado ainda não foi configurada. Fale com seu mentor.</div></div>';

  const atualizar = buildFormHTML(content, subs);
  return { visao, atualizar, kpis, metas, evolucao, alavancas:alav, comercial, plano, aprendizado, direcao, materiais };
}

// ===== OKR (Metas & faturamento) =====
function currentQuarter(){ const d=new Date(); return "Q"+(Math.floor(d.getMonth()/3)+1)+" "+d.getFullYear(); }
function quarterOptions(sel){ const y=new Date().getFullYear(); let out=""; let found=false;
  for(let yy=y; yy<=y+1; yy++){ for(let q=1;q<=4;q++){ const val="Q"+q+" "+yy; if(val===sel) found=true; out+=`<option value="${val}" ${val===sel?"selected":""}>${val}</option>`; } }
  if(sel && !found) out = `<option value="${esc(sel)}" selected>${esc(sel)}</option>`+out; return out; }
function krNum(s){ if(s==null||s==="") return NaN; return parseFloat(String(s).replace(/[^\d,.-]/g,"").replace(/\.(?=\d{3}(\D|$))/g,"").replace(",",".")); }
function krPct(meta,atual){ const m=krNum(meta), a=krNum(atual); if(isNaN(m)||m===0||isNaN(a)) return null; return Math.round(a/m*100); }
function normalizeOkr(okr){
  if(okr && Array.isArray(okr.objetivos) && okr.objetivos.length){
    return { periodo: okr.periodo||currentQuarter(), objetivos: okr.objetivos.map(o=>({ objetivo:o.objetivo||"", krs:(Array.isArray(o.krs)&&o.krs.length?o.krs:[{desc:"",meta:"",atual:""}]).map(k=>({desc:k.desc||"",meta:(k.meta==null?"":k.meta),atual:(k.atual==null?"":k.atual)})) })) };
  }
  const objs=[]; for(let i=0;i<5;i++){ const krs=[]; for(let j=0;j<4;j++) krs.push({desc:"",meta:"",atual:""}); objs.push({objetivo:"",krs:krs}); }
  return { periodo: currentQuarter(), objetivos: objs };
}
function okrKrHTML(oi,ki,k){ const pct=krPct(k.meta,k.atual); const w=pct==null?0:Math.max(0,Math.min(100,pct));
  return `<div class="okr-kr" data-oi="${oi}" data-ki="${ki}">
    <input class="okr-f kr-desc" data-oi="${oi}" data-ki="${ki}" data-f="desc" placeholder="Resultado-chave mensurável" value="${esc(k.desc||"")}">
    <input class="okr-f kr-meta" data-oi="${oi}" data-ki="${ki}" data-f="meta" placeholder="Meta" value="${esc(k.meta==null?"":k.meta)}">
    <input class="okr-f kr-atual" data-oi="${oi}" data-ki="${ki}" data-f="atual" placeholder="Atual" value="${esc(k.atual==null?"":k.atual)}">
    <div class="kr-prog"><div class="kr-bar"><span style="width:${w}%"></span></div><span class="kr-pct">${pct==null?"—":pct+"%"}</span></div>
    <button class="okr-x" data-okr="delkr" data-oi="${oi}" data-ki="${ki}" title="Remover resultado-chave">×</button></div>`; }
function okrObjHTML(oi,o){
  return `<div class="okr-obj" data-oi="${oi}">
    <div class="okr-obj-hd"><span class="okr-onum">O${oi+1}</span>
      <input class="okr-f okr-otitle" data-oi="${oi}" data-f="objetivo" placeholder="Objetivo: aonde queremos chegar neste trimestre?" value="${esc(o.objetivo||"")}">
      <button class="okr-x" data-okr="delobj" data-oi="${oi}" title="Remover objetivo">×</button></div>
    <div class="okr-krhead"><span>Resultado-chave</span><span>Meta</span><span>Atual</span><span>Progresso</span><span></span></div>
    <div class="okr-krs">${o.krs.map((k,ki)=>okrKrHTML(oi,ki,k)).join("")}</div>
    <button class="okr-addkr" data-okr="addkr" data-oi="${oi}">+ Resultado-chave</button></div>`; }
function renderOkrObjs(){ const box=document.getElementById("okrObjs"); if(!box||!_okr) return; box.innerHTML=_okr.objetivos.map((o,oi)=>okrObjHTML(oi,o)).join(""); }
function okrSectionHTML(){
  return `<div class="block-title" style="margin-top:26px">OKR do trimestre</div>
    <div class="note" style="margin:0 0 12px">Defina seus objetivos e os resultados-chave (mensuráveis) do trimestre. O % preenche sozinho conforme você informa Meta e Atual. Pode adicionar quantos objetivos e resultados quiser. Clique em "Salvar OKR" ao terminar.</div>
    <div class="okr-top"><div class="fld" style="max-width:220px"><label>Trimestre</label><select id="okr_periodo">${quarterOptions((_okr&&_okr.periodo)||currentQuarter())}</select></div></div>
    <div id="okrObjs"></div>
    <button class="okr-addobj" data-okr="addobj">+ Adicionar objetivo</button>
    <div class="save-bar"><button id="okrSaveBtn" data-okr="save">Salvar OKR</button><span id="okrMsg" class="save-msg"></span></div>`;
}
async function saveOkr(){
  const msg=document.getElementById("okrMsg"), btn=document.getElementById("okrSaveBtn"); if(!_okr) return;
  const clean={ periodo:_okr.periodo||currentQuarter(), objetivos:_okr.objetivos
    .map(o=>({ objetivo:o.objetivo||"", krs:o.krs.filter(k=>(k.desc&&k.desc.trim())||k.meta!==""||k.atual!=="") }))
    .filter(o=>(o.objetivo&&o.objetivo.trim())||o.krs.length) };
  if(!clean.objetivos.length){ if(msg){msg.textContent="Preencha ao menos um objetivo antes de salvar.";msg.className="save-msg err";} return; }
  const base=(CURRENT&&CURRENT.subs[0]&&CURRENT.subs[0].data)? JSON.parse(JSON.stringify(CURRENT.subs[0].data)) : {};
  base.okr=clean;
  const ref=(CURRENT&&CURRENT.subs[0]&&CURRENT.subs[0].mes_ref)||currentYM();
  if(msg) msg.textContent=""; if(btn){btn.disabled=true;btn.textContent="Salvando...";}
  try{
    await insertSubmission({ mentee_code:MENTEE_CODE, mentee_name:(CURRENT&&CURRENT.content&&CURRENT.content.nome)||"", mes_ref:ref, data:base });
    if(msg){msg.textContent="OKR salvo! Histórico preservado.";msg.className="save-msg ok";}
    await loadAndRender(); showView("metas");
  }catch(e){ if(msg){msg.textContent="Erro ao salvar: "+e.message;msg.className="save-msg err";} if(btn){btn.disabled=false;btn.textContent="Salvar OKR";} }
}
(function(){ const vc=document.getElementById("viewContainer"); if(!vc) return;
  vc.addEventListener("input", e=>{ const t=e.target; if(!t||!_okr) return;
    if(t.id==="okr_periodo"){ _okr.periodo=t.value; return; }
    if(t.classList&&t.classList.contains("okr-f")){ const oi=+t.dataset.oi, f=t.dataset.f; const o=_okr.objetivos[oi]; if(!o) return;
      if(f==="objetivo"){ o.objetivo=t.value; }
      else { const ki=+t.dataset.ki, k=o.krs[ki]; if(k){ k[f]=t.value; if(f==="meta"||f==="atual"){ const row=t.closest(".okr-kr"); const pct=krPct(k.meta,k.atual); const bar=row&&row.querySelector(".kr-bar>span"); const lbl=row&&row.querySelector(".kr-pct"); if(bar) bar.style.width=(pct==null?0:Math.max(0,Math.min(100,pct)))+"%"; if(lbl) lbl.textContent=(pct==null?"—":pct+"%"); } } } } });
  vc.addEventListener("change", e=>{ if(e.target&&e.target.id==="okr_periodo"&&_okr) _okr.periodo=e.target.value; });
  vc.addEventListener("click", e=>{ const b=e.target.closest("[data-okr]"); if(!b||!_okr) return; const act=b.dataset.okr; const oi=b.dataset.oi!=null?+b.dataset.oi:null;
    if(act==="addobj"){ _okr.objetivos.push({objetivo:"",krs:[{desc:"",meta:"",atual:""}]}); renderOkrObjs(); }
    else if(act==="addkr"){ if(_okr.objetivos[oi]) _okr.objetivos[oi].krs.push({desc:"",meta:"",atual:""}); renderOkrObjs(); }
    else if(act==="delobj"){ _okr.objetivos.splice(oi,1); renderOkrObjs(); }
    else if(act==="delkr"){ const ki=+b.dataset.ki; if(_okr.objetivos[oi]) _okr.objetivos[oi].krs.splice(ki,1); renderOkrObjs(); }
    else if(act==="save"){ saveOkr(); } });
})();

function showView(name){
  _lastView = name;
  const [title, sub] = VIEW_TITLE[name] || [name,""];
  document.getElementById("viewContainer").innerHTML =
    `<div class="view-head"><h1>${title}</h1><div class="vsub">${sub}</div></div>
     <div class="view active">${VIEWS[name]||""}</div>`;
  document.querySelectorAll("#sideNav button").forEach(b=> b.classList.toggle("active", b.dataset.view===name));
  destroyAllCharts();
  if(name==="metas"){ buildMetasChart(); renderOkrObjs(); }
  else if(name==="visao") buildVisaoCharts();
  else if(name==="evolucao") buildEvolucaoCharts();
  window.scrollTo({top:0});
}

function renderApp(content, subs){
  CURRENT = { content, subs };
  document.getElementById("nomeProdutora").textContent = content.nome || "Produtora";
  document.getElementById("empresaProdutora").textContent = content.empresa || "";
  VIEWS = viewsHTML(content, subs);
  const stage = _matStage || content.momento;
  document.getElementById("momentoBadge").textContent = "Momento: " + (MOMENTO_LBL[stage]||stage||"—");
  showView(_lastView || "visao");
}

// ===== FLOW =====
async function loadAndRender(){
  document.getElementById("viewContainer").innerHTML = '<div class="loading">Carregando seus dados...</div>';
  try{
    let token, code, fallbackContent=null, mentor=false;
    if(isMentorMode()){ const m=await mentorValidToken(); if(!m){ document.getElementById("viewContainer").innerHTML='<div class="loading">Sua sessão de mentor expirou. Volte ao Painel do Mentor, faça login e abra de novo.</div>'; return; } token=m.access_token; code=AS_CODE; mentor=true; }
    else { const s = await validToken(); if(!s){ doLogout(); return; } token=s.access_token; code=s.code; fallbackContent=s.content||null; }
    MENTEE_CODE = code;
    let content = await fetchMenteeContent(code, token);
    if(!content) content = fallbackContent;
    if(!content){ document.getElementById("viewContainer").innerHTML = '<div class="loading">'+(mentor?'Conteúdo desta produtora não encontrado.':'Seu conteúdo ainda não foi configurado. Fale com seu mentor.')+'</div>'; return; }
    const subs = await fetchSubmissions(code, token);
    renderApp(content, subs);
    mentorBanner(mentor, content);
  }catch(e){
    if(String(e.message)==="expirada-mentor"){ document.getElementById("viewContainer").innerHTML = '<div class="loading">Sua sessão de mentor expirou. Volte ao Painel do Mentor, faça login e abra de novo.</div>'; return; }
    if(String(e.message).includes("expirada")){ doLogout(); return; }
    document.getElementById("viewContainer").innerHTML = '<div class="loading">Erro ao carregar: '+esc(e.message)+'</div>';
  }
}
function mentorBanner(on, content){
  let bar=document.getElementById("mentorBar");
  if(!on){ if(bar) bar.remove(); return; }
  if(!bar){ bar=document.createElement("div"); bar.id="mentorBar"; document.body.prepend(bar); }
  bar.innerHTML = '👁 Modo mentor — você está vendo o portal de <b>'+esc((content&&content.nome)||AS_CODE)+'</b>. As edições que você fizer valem para esta produtora. <a href="painel.html">← Voltar ao painel</a>';
}
function showApp(){ document.getElementById("loginScreen").classList.add("hidden"); document.getElementById("appScreen").classList.remove("hidden"); loadAndRender(); }
function showLogin(){ document.getElementById("appScreen").classList.add("hidden"); document.getElementById("loginScreen").classList.remove("hidden"); }
function doLogout(){ clearSession(); showLogin(); }

document.getElementById("sideNav").addEventListener("click", e=>{ const b=e.target.closest("button[data-view]"); if(b) showView(b.dataset.view); });
document.getElementById("viewContainer").addEventListener("click", e=>{ const g=e.target.closest("[data-goto]"); if(g){ e.preventDefault(); showView(g.dataset.goto); } });
document.getElementById("viewContainer").addEventListener("input", e=>{ const t=e.target; if(t&&t.classList&&t.classList.contains("money")){ t.value=moneyMask(t.value); } });
document.getElementById("loginBtn").addEventListener("click", async ()=>{
  const btn=document.getElementById("loginBtn"), err=document.getElementById("loginErr");
  const email=document.getElementById("email").value.trim(), pwd=document.getElementById("password").value;
  if(!email||!pwd){ err.textContent="Preencha e-mail e senha."; err.classList.remove("hidden"); return; }
  err.classList.add("hidden"); btn.disabled=true; btn.textContent="Entrando...";
  try{ await login(email,pwd); showApp(); }
  catch(e){ err.textContent=e.message; err.classList.remove("hidden"); }
  finally{ btn.disabled=false; btn.textContent="Entrar"; }
});
document.getElementById("password").addEventListener("keydown",e=>{ if(e.key==="Enter") document.getElementById("loginBtn").click(); });
document.getElementById("refreshBtn").addEventListener("click", loadAndRender);
document.getElementById("logoutBtn").addEventListener("click", doLogout);

(async ()=>{ if(isMentorMode()){ showApp(); return; } const s=await validToken(); if(s) showApp(); else showLogin(); })();
</script>
